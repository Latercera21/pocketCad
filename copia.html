<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>PocketCad</title>
<style>
    * { box-sizing: border-box; }
    html, body {
        margin: 0; padding: 0; overflow: hidden; height: 100%; font-size: 14px;
        background-color: #afb1ae; //#afafaf;
    }
    #canvas { display: block; touch-action: none; }
    button {
        padding: 3px 5px; margin: 1px;
        font-size: 15px; cursor: pointer;
        border: 1px solid #979797; background: #8a998bf1;
        border-radius: 3px; line-height: 1;
    }
    button.on { background: #848484; color: white; border-color: #81b984; }
    #closeApplyBtn, #cutApplyBtn { display: none; }
    .toolbar {
        position: fixed; top: 0; left: 0; right: 0;
        display: flex; flex-wrap: wrap; gap: 2px;
        padding: 3px 4px; background: #afc0b1;
        border-bottom: 1px solid #ccc; z-index: 100;
        align-items: center;
    }
    input[type=number], input[type=text] { width: 52px; padding: 2px; font-size: 13px; }
    .float-inputs {
        position: fixed; z-index: 200;
        background: #b4b4b4; border: 1px solid #aaa;
        border-radius: 4px; padding: 4px 6px;
        display: none; align-items: center; gap: 3px; flex-wrap: wrap;
        box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    #resizeIndicator { font-style: italic; color: #c0392b; font-size: 12px; }
    span.lbl { font-size: 12px; }
    #zoomIndicator { font-size: 11px; color: #555; margin-left: 4px; min-width: 44px; }
    .modal-overlay {
        position: fixed; top:0; left:0; width:100%; height:100%;
        background: #cccccc; z-index: 9999;
        display: flex; align-items: center; justify-content: center;
    }
    .modal-box {
        background: #b8b8b8; padding: 18px; border-radius: 8px;
        width: 88%; max-width: 420px;
        display: flex; flex-direction: column; gap: 10px;
    }
    .modal-title { font-weight: bold; font-size: 15px; }
    .modal-box textarea {
        width: 100%; min-height: 130px; font-family: monospace;
        font-size: 11px; border: 1px solid #ccc; padding: 6px; resize: vertical;
    }
    .modal-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .modal-row button { flex: 1; padding: 8px; font-size: 14px; }
</style>
</head>
<body>   
    <div class="toolbar">
        <span style="font-weight:bold; margin-right:8px;">PocketCad</span>
        <button id="createBtn"     onclick="toggleCreate()"     title="Crear polígono">◻️</button>

        <input  type="number" id="sidesInput" min="3" max="10" value="4" title="Lados" style="width:32px; background:#bebcbc; border:1px solid #888; border-radius:1px; padding:2px 2px; font-size:14px;">
        <button id="lineBtn"       onclick="toggleLine()"       title="Crear línea">🖊️</button>
        <button id="curveBtn"      onclick="toggleCurve()"      title="Curvar arista">〜</button>
        <button id="moveBtn"       onclick="toggleMove()"       title="Mover figura">✋</button>                
        <button id="vertexBtn"     onclick="toggleVertex()"     title="Editar vértice">📌</button>
        <button id="snapBtn"       onclick="toggleSnap()"       title="Snap">🧲</button>
        <button id="snapEdgeBtn" onclick="toggleSnapEdge()" title="Snap a arista" style="display:none">🧲📐</button>        
        <button id="resizeBtn"     onclick="toggleResize()"     title="Cambiar longitud">📏</button>
        <button id="straightenBtn" onclick="toggleStraighten()" title="Curva→Recta">📐</button>
        <button id="addVertexBtn"  onclick="toggleAddVertex()"  title="Agregar vértice">⚫</button>
        <button id="deleteVertexBtn" onclick="toggleDeleteVertex()" title="Eliminar vértice">➖</button>
        <button id="closeShapeBtn" onclick="toggleCloseShape()" title="Cerrar figura">🔒</button>
        <button id="closeApplyBtn" onclick="applyCloseShape()"  title="Aplicar cierre">✔</button>
        <button id="edgeMoveBtn"   onclick="toggleEdgeMove()"   title="Mover arista/lado">🖋️</button>  
        <button id="mirrorBtn"     onclick="toggleMirror()"     title="Desdoblar">📖</button>
        <button id="offsetBtn"     onclick="toggleOffset()"     title="Desfase (modifica arista)">⇄</button>              
        <button id="lockBtn"       onclick="toggleLock()"       title="Bloquear/desbloquear">🔐</button>
        <button id="duplicateBtn"  onclick="toggleDuplicate()"  title="Duplicar">⧉</button>
        <button id="reflectBtn"    onclick="toggleReflect()"    title="Reflejar">🪞</button>
        <button onclick="undoAction()" title="Deshacer" >↩</button>       
        <button id="cutBtn"        onclick="toggleCut()"        title="Cortar figura con línea(s)">✂</button>
        <button id="cutApplyBtn"   onclick="applyCut()"         title="Aplicar corte">✔</button>
        <button id="grainBtn"      onclick="toggleGrainMode()"  title="Asignar hilo a figura">🧵</button>
        <button id="grainDirBtn"   onclick="toggleGrainDir()"   title="Dirección del hilo" style="display:none">→</button>
        <button id="rotateBtn"     onclick="toggleRotate()"     title="Rotar">🔄</button>      
        <input  type="number" id="rotateInput" value="180" step="1" title="Grados" style="width:45px; background:#b1b0b0; border:1px solid #888; border-radius:1px; padding:2px 2px; font-size:14px;">
        <button id="joinCurvesBtn" onclick="toggleJoinCurves()" title="Unir curvas">⛓</button>
        <button id="joinApplyBtn"  onclick="applyJoinCurves()"  title="Aplicar unión" style="display:none">✔</button>  
        <button id="deleteBtn"     onclick="toggleDelete()"     title="Eliminar figura">🗑️</button>
        <button onclick="clearAll()"   title="Eliminar todo">💥</button>
        <button onclick="exportJSON()" title="Exportar JSON">💾</button>
        <button onclick="exportSVG()" title="Exportar SVG">🖼️</button>
        <button onclick="importJSON()" title="Importar JSON">📂</button>
        <span id="zoomIndicator">100%</span>
        <button onclick="resetView()" title="Restablecer vista">⊙</button>
        <button onclick="location.href='nesting.html'">nestingPro</button>//
        <span style="font-weight:bold; color:#eff4fd; margin:0 6px; font-size:15px; align-self:center;">R∆yøTęmper∆</span>
        <span style="font-weight:bold; color:#585858; margin:0 6px; font-size:15px; align-self:center;">latercera21@hotmail.com</span>
    </div>

<div id="vertexInputs" class="float-inputs">
    <label><input type="checkbox" id="vertexFijar" onchange="toggleVertexInputs()">🔒</label>
    <span id="vertexCoordInputs" style="display:none; align-items:center; gap:3px;">
        <span class="lbl">X=>:</span><input type="number" inputmode="decimal" id="vertexDX" placeholder="X=>" value="0" style="width:45px; background:#aaaaaa; border:1px solid #888; border-radius:3px; padding:1px 1px; font-size:14px;">
        <span class="lbl">Y⬇︎:</span><input type="number" inputmode="decimal" id="vertexDY" placeholder="Y⬇︎" value="0" style="width:45px; background:#aaaaaa; border:1px solid #888; border-radius:3px; padding:1px 1px; font-size:14px;">
        <button onclick="applyVertexDelta()">✓</button>
    </span>
    <button onclick="hidePanel('vertexInputs')">✕</button>
</div>
<div id="resizeInputs" class="float-inputs">
    <span class="lbl">cm:</span>
    <input type="number" inputmode="decimal" id="resizeValue" placeholder="ej: 25.5" style="width:50px">
    <button onclick="applyResize()">✓</button>
    <button onclick="hidePanel('resizeInputs')">X</button>
    <span id="resizeIndicator"></span>
</div>
<div id="offsetInputs" class="float-inputs">
    <span class="lbl">cm:</span>
    <input type="number" inputmode="decimal" id="offsetValue" placeholder="ej: 1.5" style="width:50px">
    <button onclick="applyOffset()">✓</button>
    <button onclick="hidePanel('offsetInputs')">X</button>
</div>

<canvas id="canvas"></canvas>

<script>
    const PX_PER_CM = 96 / 2.54;

    function cmToPx(str) {
        const v = parseFloat(String(str).trim().replace(',', '.'));
        return isNaN(v) ? NaN : v * PX_PER_CM;
    }
    function pxToCm(px) { return parseFloat((px / PX_PER_CM).toFixed(2)); }

    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');

    let figures        = [];
    let figuresHistory = [];
    let mode           = 'none';
    let dragData       = null;
    let selectedVertex = null;
    let selectedEdge   = null;
    let resizeEdges    = [];
    let snapEnabled    = false;
    let snapEdgeEnabled = false;    
    let joinSelection  = [];
    let grainDir       = 'horizontal';
    let lineStartPoint = null;
    let offsetEdges = []; // reemplaza selectedEdge para offset

    // --- Estado de corte ---
    let cutLineIndices = [];   // indices de lineas seleccionadas para cortar

    // --- Estado de cerrar figura ---
    let closeLineIndices = []; // indices de lineas a unir en figura cerrada

    // --- Estado de curva midpoint drag ---
    let curveActiveDrag = null; // {figureIndex, edgeIndex, dragging}

    let viewScale = 0.2, viewOffX = 0, viewOffY = 0;
    let isPanning = false, panStart = {x:0,y:0};
    let pinchStartDist = null, pinchStartScale = 1, pinchLastCx = null, pinchLastCy = null;
    let isTouchDevice = false, lastTouchTime = 0;

    const SNAP_THR_PX = 15;
    function getToolbarHeight() {
        return document.querySelector('.toolbar').getBoundingClientRect().height;
    }
    function getSnapThreshold() { return SNAP_THR_PX / viewScale; }

    function resizeCanvas() {
        const dpr = window.devicePixelRatio || 1;
        canvas.width  = window.innerWidth  * dpr;
        canvas.height = window.innerHeight * dpr;
        canvas.style.width  = window.innerWidth  + 'px';
        canvas.style.height = window.innerHeight + 'px';
        redrawAll();
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function showPanel(id) {
        const el = document.getElementById(id);
        el.style.display = 'flex';
        el.style.top  = (getToolbarHeight() + 6) + 'px';
        el.style.left = '4px';
    }
    function hidePanel(id) {
        document.getElementById(id).style.display = 'none';
        if (id === 'vertexInputs') { selectedVertex = null; }
        if (id === 'resizeInputs') {
            selectedEdge = null;
            resizeEdges = [];
            document.getElementById('resizeValue').disabled = false;
            document.getElementById('resizeIndicator').textContent = '';
        }
        if (id === 'offsetInputs') { selectedEdge = null; }
        redrawAll();
    }

    function toggleVertexInputs(){
        const checked = document.getElementById('vertexFijar').checked;
        document.getElementById('vertexCoordInputs').style.display = checked ? 'flex' : 'none';
    }

    function showModal({ title, body, textarea, buttons, editable = false }) {
    return new Promise(resolve => {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        const box = document.createElement('div');
        box.className = 'modal-box';
        const t = document.createElement('div');
        t.className = 'modal-title'; t.textContent = title; box.appendChild(t);
        if (body) { const p = document.createElement('div'); p.textContent = body; box.appendChild(p); }
        let taEl = null;
        if (textarea !== undefined) {
            taEl = document.createElement('textarea');
            taEl.value = textarea; taEl.readOnly = !editable; box.appendChild(taEl);
        }
        const row = document.createElement('div'); row.className = 'modal-row';
        buttons.forEach(btn => {
            const b = document.createElement('button');
            b.textContent = btn.label;
            b.onclick = () => { document.body.removeChild(overlay); resolve(btn.value ?? btn.label); };
            row.appendChild(b);
        });
        box.appendChild(row); overlay.appendChild(box);
        overlay.addEventListener('click', e => { if(e.target===overlay){document.body.removeChild(overlay);resolve(null);} });
        document.body.appendChild(overlay);
        if (taEl) setTimeout(() => taEl.select(), 80);
    });
}

    function saveState() {
        figuresHistory.push(JSON.parse(JSON.stringify(figures)));
        if (figuresHistory.length > 20) figuresHistory.shift();
    }
    function undoAction() {
        if (figuresHistory.length > 0) { figures = figuresHistory.pop(); redrawAll(); }
        else showModal({ title:'Deshacer', body:'No hay acciones para deshacer.', buttons:[{label:'OK'}] });
    }
    function clearAll() {
        showModal({
            title: '¿Eliminar todo?',
            body: 'Se eliminarán todas las figuras.',
            buttons: [{label:'Eliminar todo',value:'yes'},{label:'Cancelar',value:'no'}]
        }).then(r => { if (r==='yes') { saveState(); figures=[]; redrawAll(); } });
    }

    function updateZoomIndicator() {
        document.getElementById('zoomIndicator').textContent = Math.round(viewScale*100)+'%';
    }
    function resetView() {
        viewScale=1; viewOffX=0; viewOffY=0;
        updateZoomIndicator(); redrawAll();
    }
    function screenToWorld(sx, sy) {
        return { x:(sx-viewOffX)/viewScale, y:(sy-viewOffY)/viewScale };
    }
    function applyZoom(delta, cx, cy) {
        const factor = delta > 0 ? 0.9 : 1.1;
        const ns = Math.min(10, Math.max(0.01, viewScale * factor));
        viewOffX = cx - (cx - viewOffX) * (ns / viewScale);
        viewOffY = cy - (cy - viewOffY) * (ns / viewScale);
        viewScale = ns;
        updateZoomIndicator(); redrawAll();
    }
    canvas.addEventListener('wheel', e => {
        e.preventDefault();
        applyZoom(e.deltaY, e.clientX, e.clientY);
    }, {passive:false});

    function toggleGrainDir() {
        grainDir = grainDir==='horizontal' ? 'vertical' : 'horizontal';
        document.getElementById('grainDirBtn').textContent = grainDir==='horizontal' ? '→' : '↕';
    }

    function toggleGrainMode()  { setMode('grain'); }
    function toggleCreate()     { setMode('create'); }
    function toggleLine()       { setMode('line'); }
    function toggleMove()       { setMode('move'); }
    function toggleStraighten() { setMode('straighten'); }
    function toggleDelete()     { setMode('delete'); }
    function toggleLock()       { setMode('lock'); } 
    function toggleMirror()     { setMode('mirror'); }
    function toggleAddVertex()  { setMode('addVertex'); }
    function toggleDeleteVertex() { setMode('deleteVertex'); }
    function toggleResize()     { setMode('resize'); }
    function toggleEdgeMove()   { setMode('edgeMove'); }
    function toggleRotate()     { setMode('rotate'); }
    function toggleDuplicate()  { setMode('duplicate'); }
    function toggleReflect()    { setMode('reflect'); }

    function toggleOffset() {
    if (mode==='offset') {
        setMode('none');
        offsetEdges=[];
        redrawAll();
    } else {
        setMode('offset');
        offsetEdges=[];
    }
}

    function toggleVertex() {
        if (mode==='vertex') { setMode('none'); hidePanel('vertexInputs'); }
        else { setMode('vertex'); }
    }

    function toggleSnap() {
    snapEnabled = !snapEnabled;
    document.getElementById('snapBtn').classList.toggle('on', snapEnabled);
    const edgeBtn = document.getElementById('snapEdgeBtn');
    edgeBtn.style.display = snapEnabled ? 'inline-block' : 'none';
    if (!snapEnabled) { snapEdgeEnabled = false; edgeBtn.classList.remove('on'); }
}

function toggleSnapEdge() {
    snapEdgeEnabled = !snapEdgeEnabled;
    document.getElementById('snapEdgeBtn').classList.toggle('on', snapEdgeEnabled);
}


    function toggleJoinCurves() {
        if (mode==='joinCurves') {
            setMode('none');
            document.getElementById('joinApplyBtn').style.display='none';
            joinSelection=[]; redrawAll();
        } else {
            setMode('joinCurves');
            document.getElementById('joinApplyBtn').style.display='inline-block';
            joinSelection=[];
        }
    }
    function toggleCut() {
        if (mode==='cut') {
            setMode('none');
            document.getElementById('cutApplyBtn').style.display='none';
            cutLineIndices=[]; redrawAll();
        } else {
            setMode('cut');
            document.getElementById('cutApplyBtn').style.display='inline-block';
            cutLineIndices=[];
        }
    }
    function toggleCloseShape() {
        if (mode==='closeShape') {
            setMode('none');
            document.getElementById('closeApplyBtn').style.display='none';
            closeLineIndices=[]; redrawAll();
        } else {
            setMode('closeShape');
            document.getElementById('closeApplyBtn').style.display='inline-block';
            closeLineIndices=[];
        }
    }

    // Modo curva: ahora usa midpoint drag
    function toggleCurve() {
        if (mode==='curve') { setMode('none'); }
        else { setMode('curve'); }
    }

    const ALL_MODES = ['create','line','move','vertex','addVertex','deleteVertex','curve','straighten',
        'delete','mirror','resize','edgeMove','rotate','duplicate','reflect',
        'joinCurves','grain','offset','cut','closeShape','lock'];

    function setMode(newMode) {
        const prev = mode;
        ALL_MODES.forEach(m => {
            const btn = document.getElementById(m+'Btn');
            if (btn) btn.classList.remove('on');
        });
        if (prev==='resize')     { hidePanel('resizeInputs'); }
        if (prev==='vertex')     { hidePanel('vertexInputs'); }
        if (prev==='offset') { hidePanel('offsetInputs'); offsetEdges=[]; }        
        if (prev==='joinCurves') { document.getElementById('joinApplyBtn').style.display='none'; joinSelection=[]; }
        if (prev==='cut')        { document.getElementById('cutApplyBtn').style.display='none'; cutLineIndices=[]; }
        if (prev==='closeShape') { document.getElementById('closeApplyBtn').style.display='none'; closeLineIndices=[]; }
        if (prev==='line')       { lineStartPoint = null; }
        if (prev==='curve')      { curveActiveDrag = null; }

        if (newMode===prev || newMode==='none') { mode='none'; document.getElementById('grainDirBtn').style.display='none'; redrawAll(); return; }

        mode = newMode;
        document.getElementById('grainDirBtn').style.display = newMode==='grain' ? 'inline-block' : 'none';
        const btn = document.getElementById(newMode+'Btn');
        if (btn) btn.classList.add('on');
        if (newMode==='resize')     showPanel('resizeInputs');
        if (newMode==='vertex')     showPanel('vertexInputs');
        if (newMode==='offset')     showPanel('offsetInputs');
        redrawAll();
    }

    // ===================== SNAP =====================
    function applySnap(x, y, exFi, exVi) {
    let sx=x, sy=y, fx=false, fy=false;
    for (let fi=0; fi<figures.length && (!fx||!fy); fi++)
        for (let vi=0; vi<figures[fi].vertices.length && (!fx||!fy); vi++) {
            if (fi===exFi && vi===exVi) continue;
            const v=figures[fi].vertices[vi];               
            if (!fy && Math.abs(y-v.y)<getSnapThreshold()) { sy=v.y; fy=true; }
            if (!fx && Math.abs(x-v.x)<getSnapThreshold()) { sx=v.x; fx=true; }
        }
    return {x:sx,y:sy};
}

    function drawSnapGuides(x, y, exFi, exVi) {
        ctx.save();
        ctx.strokeStyle='#000369';
        ctx.lineWidth=1/viewScale;
        ctx.setLineDash([4/viewScale,4/viewScale]);
        for (let fi=0; fi<figures.length; fi++)
            for (let vi=0; vi<figures[fi].vertices.length; vi++) {
                if (fi===exFi && vi===exVi) continue;
                const v=figures[fi].vertices[vi];
                if (Math.abs(y-v.y)<getSnapThreshold()) { ctx.beginPath();ctx.moveTo(-1e6,v.y);ctx.lineTo(1e6,v.y);ctx.stroke(); }
                if (Math.abs(x-v.x)<getSnapThreshold()) { ctx.beginPath();ctx.moveTo(v.x,-1e6);ctx.lineTo(v.x,1e6);ctx.stroke(); }
            }
        ctx.restore();
    }

    // ===================== GEOMETRIA BASICA =====================
    function q2c(p0,c,p1) {
        return {
            cp1:{x:p0.x+2/3*(c.x-p0.x),y:p0.y+2/3*(c.y-p0.y)},
            cp2:{x:p1.x+2/3*(c.x-p1.x),y:p1.y+2/3*(c.y-p1.y)}
        };
    }
    function makeEdge(s,e) {
        return{start:s,end:e,curved:false,cubic:false,controlX:null,controlY:null,control2X:null,control2Y:null};
    }

    function createPolygon(cx,cy,sides,radius=1000,locked=false) {
        const vertices=[],edges=[];
        for (let i=0;i<sides;i++) {
            //const ang=(i*2*Math.PI)/sides-Math.PI/2;
            const ang = (i * 2 * Math.PI) / sides - Math.PI / sides;
            vertices.push({x:cx+radius*Math.cos(ang),y:cy+radius*Math.sin(ang)});
        }
        for (let i=0;i<sides;i++) edges.push(makeEdge(i,(i+1)%sides));
        return {vertices,edges,closed:true,grain:null,locked:false};
    }

    function createLine(start,end) {
        return {
            vertices:[{x:start.x,y:start.y},{x:end.x,y:end.y}],
            edges:[makeEdge(0,1)],
            closed:false,
            grain:null,
            locked:false
        };
    }

    // punto-en-poligono casi nunca detectaba clics dentro de la figura.
    function figureAPolilineaGrande(figure, samplesPerCurve = 15) {
        const pts = [];
        figure.edges.forEach(e => {
            const a = figure.vertices[e.start], b = figure.vertices[e.end];
            pts.push({x:a.x, y:a.y});
            if (e.cubic && e.control2X != null) {
                for (let i = 1; i < samplesPerCurve; i++) {
                    const t = i / samplesPerCurve, mt = 1 - t;
                    pts.push({
                        x: mt*mt*mt*a.x + 3*mt*mt*t*e.controlX + 3*mt*t*t*e.control2X + t*t*t*b.x,
                        y: mt*mt*mt*a.y + 3*mt*mt*t*e.controlY + 3*mt*t*t*e.control2Y + t*t*t*b.y
                    });
                }
            } else if (e.curved && e.controlX != null) {
                for (let i = 1; i < samplesPerCurve; i++) {
                    const t = i / samplesPerCurve;
                    pts.push({
                        x: (1-t)*(1-t)*a.x + 2*(1-t)*t*e.controlX + t*t*b.x,
                        y: (1-t)*(1-t)*a.y + 2*(1-t)*t*e.controlY + t*t*b.y
                    });
                }
            }
        });
        return pts;
    }

    function isPointInPolygon(x,y,figure) {
        if (!figure.closed) return false;
        const v = figureAPolilineaGrande(figure, 15);
        if (v.length < 3) return false;
        let inside=false;
        for (let i=0,j=v.length-1;i<v.length;j=i++)
            if (((v[i].y>y)!==(v[j].y>y))&&(x<(v[j].x-v[i].x)*(y-v[i].y)/(v[j].y-v[i].y)+v[i].x))
                inside=!inside;
        return inside;
    }

    function findClickedFigure(wx,wy) {
        for (let i=figures.length-1;i>=0;i--) {
            if (figures[i].closed && isPointInPolygon(wx,wy,figures[i])) return i;
        }
        for (let i=figures.length-1;i>=0;i--) {
            if (!figures[i].closed) {
                for (const e of figures[i].edges) {
                    if (edgeDist(wx,wy,figures[i],e) < 15/viewScale) return i;
                }
            }
        }
        return -1;
    }

    function findNearestVertex(wx,wy) {
        const thr=20/viewScale;
        for (let fi=0;fi<figures.length;fi++)
            for (let vi=0;vi<figures[fi].vertices.length;vi++) {
                const p=figures[fi].vertices[vi];
                if (Math.hypot(wx-p.x,wy-p.y)<thr) return{figureIndex:fi,vertexIndex:vi};
            }
        return null;
    }

    function dLine(px,py,x1,y1,x2,y2){
        const A=px-x1,B=py-y1,C=x2-x1,D=y2-y1,dot=A*C+B*D,len=C*C+D*D;
        if(!len) return Math.hypot(A,B);
        const t=Math.min(1,Math.max(0,dot/len));
        return Math.hypot(px-(x1+t*C),py-(y1+t*D));
    }
    function dQuad(px,py,x1,y1,cx,cy,x2,y2){
        let d=Infinity;
        for(let t=0;t<=1;t+=0.05){const xt=(1-t)*(1-t)*x1+2*(1-t)*t*cx+t*t*x2,yt=(1-t)*(1-t)*y1+2*(1-t)*t*cy+t*t*y2;d=Math.min(d,Math.hypot(px-xt,py-yt));}
        return d;
    }
    function dCubic(px,py,x0,y0,cx1,cy1,cx2,cy2,x1,y1){
        let d=Infinity;
        for(let t=0;t<=1;t+=0.05){const mt=1-t,xt=mt*mt*mt*x0+3*mt*mt*t*cx1+3*mt*t*t*cx2+t*t*t*x1,yt=mt*mt*mt*y0+3*mt*mt*t*cy1+3*mt*t*t*cy2+t*t*t*y1;d=Math.min(d,Math.hypot(px-xt,py-yt));}
        return d;
    }
    function edgeDist(x,y,fig,e){
        const a=fig.vertices[e.start],b=fig.vertices[e.end];
        if(e.cubic&&e.control2X!=null) return dCubic(x,y,a.x,a.y,e.controlX,e.controlY,e.control2X,e.control2Y,b.x,b.y);
        if(e.curved&&e.controlX!=null) return dQuad(x,y,a.x,a.y,e.controlX,e.controlY,b.x,b.y);
        return dLine(x,y,a.x,a.y,b.x,b.y);
    }
    function findNearestEdge(wx,wy){
        const thr=15/viewScale;
        for(let fi=0;fi<figures.length;fi++){
            const f=figures[fi];
            for(let ei=0;ei<f.edges.length;ei++)
                if(edgeDist(wx,wy,f,f.edges[ei])<thr) return{figureIndex:fi,edgeIndex:ei};
        }
        return null;
    }

    function closestOnLine(px,py,x1,y1,x2,y2){
        const A=px-x1,B=py-y1,C=x2-x1,D=y2-y1,dot=A*C+B*D,len=C*C+D*D;
        if(!len) return{x:x1,y:y1,t:0};
        const t=Math.max(0,Math.min(1,dot/len));return{x:x1+t*C,y:y1+t*D,t};
    }
    function getCentroid(figure){
        let cx=0,cy=0;figure.vertices.forEach(v=>{cx+=v.x;cy+=v.y;});
        return{x:cx/figure.vertices.length,y:cy/figure.vertices.length};
    }

    function sampleFigureEdges(figure, steps=80) {
        const pts = [];
        for (let ei = 0; ei < figure.edges.length; ei++) {
            const e = figure.edges[ei];
            const a = figure.vertices[e.start];
            const b = figure.vertices[e.end];
            if (pts.length === 0 || Math.hypot(pts[pts.length-1].x - a.x, pts[pts.length-1].y - a.y) > 0.01) {
                pts.push({x: a.x, y: a.y});
            }
            if (e.cubic && e.control2X != null) {
            for (let i = 1; i <= steps; i++) {
                const t = i/steps, mt=1-t;
                pts.push({x: mt*mt*mt*a.x+3*mt*mt*t*e.controlX+3*mt*t*t*e.control2X+t*t*t*b.x, y: mt*mt*mt*a.y+3*mt*mt*t*e.controlY+3*mt*t*t*e.control2Y+t*t*t*b.y});
            }
        } else if (e.curved && e.controlX != null) {
            for (let i = 1; i <= steps; i++) {
                const t = i/steps;
                pts.push({x: (1-t)*(1-t)*a.x+2*(1-t)*t*e.controlX+t*t*b.x, y: (1-t)*(1-t)*a.y+2*(1-t)*t*e.controlY+t*t*b.y});
            }
        } else {
            pts.push({x: b.x, y: b.y});
        }
    }
    return pts;
    }

    // Convierte lineas de corte seleccionadas en stroke muestreada
    function buildCutEdges(lineIndices) {
        if (lineIndices.length === 0) return {vertices: [], edges: []};

        // Construir segmentos con sus edges originales
        const segs = lineIndices.map(li => ({
            vertices: figures[li].vertices.map(v => ({x:v.x, y:v.y})),
            edges: figures[li].edges.map(e => Object.assign({}, e)),
            reversed: false
        }));

        // Encadenar por proximidad de extremos
        const ordered = [segs[0]];
        const used = segs.map((_,i) => i === 0);

        for (let pass = 0; pass < segs.length; pass++) {
            for (let i = 1; i < segs.length; i++) {
                if (used[i]) continue;
                const last  = ordered[ordered.length - 1];
                const first = ordered[0];
                const lastV  = last.reversed  ? last.vertices[0]                    : last.vertices[last.vertices.length - 1];
                const firstV = first.reversed ? first.vertices[first.vertices.length - 1] : first.vertices[0];
                const seg = segs[i];
                const sFirst = seg.vertices[0];
                const sLast  = seg.vertices[seg.vertices.length - 1];
                const dEF = Math.hypot(lastV.x - sFirst.x,  lastV.y - sFirst.y);
                const dEL = Math.hypot(lastV.x - sLast.x,   lastV.y - sLast.y);
                const dSF = Math.hypot(firstV.x - sFirst.x, firstV.y - sFirst.y);
                const dSL = Math.hypot(firstV.x - sLast.x,  firstV.y - sLast.y);
                const best = Math.min(dEF, dEL, dSF, dSL);
                if (best > 50) continue;
                const clone = {vertices: seg.vertices, edges: seg.edges, reversed: false};
                if      (best === dEF) { clone.reversed = false; ordered.push(clone); }
                else if (best === dEL) { clone.reversed = true;  ordered.push(clone); }
                else if (best === dSF) { clone.reversed = true;  ordered.unshift(clone); }
                else                   { clone.reversed = false; ordered.unshift(clone); }
                used[i] = true;
            }
        }

        const verts = [];
        const edges = [];

        for (const seg of ordered) {
        const vs = seg.reversed ? [...seg.vertices].reverse() : seg.vertices;
            const es = seg.reversed ? [...seg.edges].reverse()    : seg.edges;

            const offset = verts.length === 0 ? 0 : verts.length - 1;

            for (let vi = 0; vi < vs.length; vi++) {
                if (vi === 0 && verts.length > 0) continue; 
                verts.push({x: vs[vi].x, y: vs[vi].y});
            }

            for (let ei = 0; ei < es.length; ei++) {
                const e = Object.assign({}, es[ei]);
                if (seg.reversed) {                
                    const tmp = e.start; e.start = e.end; e.end = tmp;                
                }
                e.start = offset + ei;
                e.end   = offset + ei + 1;
                edges.push(e);
            }
        }

        return {vertices: verts, edges};
    }

    function findExactCrossings(figure, cutData) {
        const figPts = sampleFigureEdges(figure, 60);
        const cutPts = sampleFigureEdges({vertices: cutData.vertices, edges: cutData.edges}, 60);
        if (figPts.length < 2 || cutPts.length < 2) return [];
    
        const crossings = [];
        for (let ci = 0; ci < cutPts.length - 1; ci++) {
            const cA = cutPts[ci], cB = cutPts[ci + 1];
            for (let fi = 0; fi < figPts.length - 1; fi++) {
                const fA = figPts[fi], fB = figPts[fi + 1];
                const inter = lineLineIntersect(fA, fB, cA, cB);
                if (inter) {
                    // punto de intersección
                    const pt = {
                        x: fA.x + (fB.x - fA.x) * inter.t_fig,
                        y: fA.y + (fB.y - fA.y) * inter.t_fig
                    };
                    // Determinar a qué edge original pertenece el punto (por cercanía al punto medio)
                    let bestFigEdge = -1, bestFigT = 0, bestFigDist = Infinity;
                    for (let ei = 0; ei < figure.edges.length; ei++) {
                        const edge = figure.edges[ei];
                        const d = edgeDist(pt.x, pt.y, figure, edge);
                        if (d < bestFigDist) {
                            bestFigDist = d;
                            bestFigEdge = ei;
                            // calcular t aproximado en el edge original
                            const a = figure.vertices[edge.start], b = figure.vertices[edge.end];
                        if (edge.curved && edge.controlX != null) {
                            bestFigT = closestTOnQuad(pt, a, {x: edge.controlX, y: edge.controlY}, b, 80);
                        } else {
                            bestFigT = projectOntoLine(pt, a, b);
                        }
                        bestFigT = Math.max(0, Math.min(1, bestFigT));
                    }
                }
                let bestCutEdge = -1, bestCutT = 0, bestCutDist = Infinity;
                for (let ei = 0; ei < cutData.edges.length; ei++) {
                    const edge = cutData.edges[ei];
                    const d = edgeDist(pt.x, pt.y, {vertices: cutData.vertices, edges: cutData.edges}, edge);
                    if (d < bestCutDist) {
                        bestCutDist = d;
                        bestCutEdge = ei;
                        const a = cutData.vertices[edge.start], b = cutData.vertices[edge.end];
                        if (edge.curved && edge.controlX != null) {
                            bestCutT = closestTOnQuad(pt, a, {x: edge.controlX, y: edge.controlY}, b, 80);
                        } else {
                            bestCutT = projectOntoLine(pt, a, b);
                        }
                        bestCutT = Math.max(0, Math.min(1, bestCutT));
                    }
                }
                crossings.push({
                    edgeIdx: bestFigEdge,
                    t_fig: bestFigT,
                    pt: pt,
                    cutEdgeIdx: bestCutEdge,
                    t_cut: bestCutT,
                    strokeIdx: bestCutEdge * 1000 + Math.round(bestCutT * 1000)
                });
            }
        }
    }

    // deduplicar por cercanía
    const deduped = [];
    for (const c of crossings) {
        if (!deduped.some(d => Math.hypot(d.pt.x - c.pt.x, d.pt.y - c.pt.y) < 1.5)) {
            deduped.push(c);
        }
    }
    deduped.sort((a, b) => a.strokeIdx - b.strokeIdx);
    return deduped;
}
//findExactCrossing fin

function edgeToSegment(figure, edge) {
    const a = figure.vertices[edge.start];
    const b = figure.vertices[edge.end];
    if (edge.curved && edge.controlX != null) {
        return { type: 'quad', pts: [a, {x: edge.controlX, y: edge.controlY}, b] };
    }
    return { type: 'line', pts: [a, b] };
}

function subdivideSegment(seg, t) {
    if (seg.type === 'line') {
        const pt = ptOnLine(seg.pts[0], seg.pts[1], t);
        return {
            left:  { type: 'line', pts: [seg.pts[0], pt] },
            right: { type: 'line', pts: [pt, seg.pts[1]] }
        };
    } else {
        const s = splitQuadraticBezier(seg.pts[0], seg.pts[1], seg.pts[2], t);
        return {
            left:  { type: 'quad', pts: [s.left.start, {x:s.left.controlX, y:s.left.controlY}, s.left.end] },
            right: { type: 'quad', pts: [s.right.start, {x:s.right.controlX, y:s.right.controlY}, s.right.end] }
        };
    }
}

function ptOnLine(p0, p1, t) {
    return { x: p0.x + (p1.x - p0.x) * t, y: p0.y + (p1.y - p0.y) * t };
}

function invertirSegmento(seg) {
    if (seg.type === 'line') {
        return { type: 'line', pts: [seg.pts[1], seg.pts[0]] };
    } else {
        return { type: 'quad', pts: [seg.pts[2], seg.pts[1], seg.pts[0]] };
    }
}

function segmentToEdge(seg, startIdx, endIdx) {
    if (seg.type === 'line') {
        return { start: startIdx, end: endIdx, curved: false, cubic: false, controlX: null, controlY: null, control2X: null, control2Y: null };
    } else {
        return { start: startIdx, end: endIdx, curved: true, cubic: false, controlX: seg.pts[1].x, controlY: seg.pts[1].y, control2X: null, control2Y: null };
    }
}

    function fijarEndpoint(seg, pt) {
        if (seg.type === 'line') {
            return { type: 'line', pts: [seg.pts[0], pt] };
        } else {
            return { type: 'quad', pts: [seg.pts[0], seg.pts[1], pt] };
        }
    }

    function fijarStartpoint(seg, pt) {
        if (seg.type === 'line') {
            return { type: 'line', pts: [pt, seg.pts[1]] };
        } else {
        return { type: 'quad', pts: [pt, seg.pts[1], seg.pts[2]] };
        }
    }

    function splitWithStroke(figure, cutData, crossings) {
        if (crossings.length < 2) return null;

        const hitE = crossings[0];
        const hitS = crossings[crossings.length - 1];

        // Convertir figura a segmentos
        const figSegs = figure.edges.map(e => edgeToSegment(figure, e));
        const cutSegs = cutData.edges.map(e => edgeToSegment(cutData, e));

        // --- Subdividir el camino de corte entre hitE y hitS ---
        function buildCutInterior() {
            if (hitE.cutEdgeIdx === hitS.cutEdgeIdx) {
                const seg = cutSegs[hitE.cutEdgeIdx];
                const tA = Math.min(hitE.t_cut, hitS.t_cut);
                const tB = Math.max(hitE.t_cut, hitS.t_cut);
                const spA = subdivideSegment(seg, tA);
                const tRelB = (tB - tA) / (1 - tA);
                const spB = subdivideSegment(spA.right, tRelB);
                return [spB.left];
            } else {
                const interior = [];
                // Primer segmento: parte derecha desde hitE
                const firstSeg = cutSegs[hitE.cutEdgeIdx];
                const spFirst = subdivideSegment(firstSeg, hitE.t_cut);
                interior.push(spFirst.right);

                // Segmentos intermedios completos
                const inc = (hitS.cutEdgeIdx > hitE.cutEdgeIdx) ? 1 : -1;
                for (let ci = hitE.cutEdgeIdx + inc; ci !== hitS.cutEdgeIdx; ci += inc) {
                    interior.push(cutSegs[ci]);
                }

                // Último segmento: parte izquierda hasta hitS
                const lastSeg = cutSegs[hitS.cutEdgeIdx];
                const spLast = subdivideSegment(lastSeg, hitS.t_cut);
                interior.push(spLast.left);

                // Si el recorrido fue en orden inverso, invertir todo
                if (hitS.cutEdgeIdx < hitE.cutEdgeIdx) {
                    interior.reverse();
                    for (let i = 0; i < interior.length; i++) {
                        interior[i] = invertirSegmento(interior[i]);
                    }
                }
                return interior;
            }
        }

        const cutInterior = buildCutInterior();  
        // con los puntos de intersección, evitando huecos en los vértices.
        if (cutInterior.length > 0) {
            cutInterior[0] = fijarStartpoint(cutInterior[0], hitE.pt);
            cutInterior[cutInterior.length - 1] = fijarEndpoint(cutInterior[cutInterior.length - 1], hitS.pt);
        }

        const nodos = [];
        for (let i = 0; i < figSegs.length; i++) {
            if (i === hitE.edgeIdx && i === hitS.edgeIdx) {
                // Ambos en el mismo segmento
                const tA = Math.min(hitE.t_fig, hitS.t_fig);
                const tB = Math.max(hitE.t_fig, hitS.t_fig);
                const spA = subdivideSegment(figSegs[i], tA);
                const tRelB = (tB - tA) / (1 - tA);
                const spB = subdivideSegment(spA.right, tRelB);

                nodos.push({ kind: 'seg', seg: spA.left });
                nodos.push({ kind: 'cut', id: 'E', pt: hitE.t_fig < hitS.t_fig ? hitE.pt : hitS.pt });
                nodos.push({ kind: 'seg', seg: spB.left });
                nodos.push({ kind: 'cut', id: 'S', pt: hitE.t_fig < hitS.t_fig ? hitS.pt : hitE.pt });
                nodos.push({ kind: 'seg', seg: spB.right });
            } else if (i === hitE.edgeIdx) {
            const sp = subdivideSegment(figSegs[i], hitE.t_fig);
            nodos.push({ kind: 'seg', seg: sp.left });
            nodos.push({ kind: 'cut', id: 'E', pt: hitE.pt });
            nodos.push({ kind: 'seg', seg: sp.right });
            } else if (i === hitS.edgeIdx) {
                const sp = subdivideSegment(figSegs[i], hitS.t_fig);
                nodos.push({ kind: 'seg', seg: sp.left });
                nodos.push({ kind: 'cut', id: 'S', pt: hitS.pt });
                nodos.push({ kind: 'seg', seg: sp.right });
            } else {
                nodos.push({ kind: 'seg', seg: figSegs[i] });
            }
        }

        const posE = nodos.findIndex(n => n.kind === 'cut' && n.id === 'E');
        const posS = nodos.findIndex(n => n.kind === 'cut' && n.id === 'S');
        if (posE < 0 || posS < 0) return null;

        function arcoSegs(desde, hasta) {
            const segs = [];
            let i = (desde + 1) % nodos.length;
            while (i !== hasta) {
                if (nodos[i].kind === 'seg') segs.push(nodos[i].seg);
                i = (i + 1) % nodos.length;
            }
            return segs;
        }

        const segsLadoA = arcoSegs(posE, posS);
        const segsLadoB = arcoSegs(posS, posE);

        if (segsLadoA.length > 0) {
            segsLadoA[0] = fijarStartpoint(segsLadoA[0], hitE.pt);
            segsLadoA[segsLadoA.length - 1] = fijarEndpoint(segsLadoA[segsLadoA.length - 1], hitS.pt);
        }
        if (segsLadoB.length > 0) {
            segsLadoB[0] = fijarStartpoint(segsLadoB[0], hitS.pt);
            segsLadoB[segsLadoB.length - 1] = fijarEndpoint(segsLadoB[segsLadoB.length - 1], hitE.pt);
        }

        // Convertir lista de segmentos a figura CAD Cloth
        function segsToFigure(segs) {
            const rawVertices = [];
            const edges = [];

        // --- 1. Recolectar todos los vértices sin fusionar ---
            for (const seg of segs) {
                const startPt = seg.pts[0];
                const endPt = seg.type === 'line' ? seg.pts[1] : seg.pts[2];
                // Evitar duplicados idénticos por referencia, pero permitimos fusión posterior
                rawVertices.push({x: startPt.x, y: startPt.y});
                rawVertices.push({x: endPt.x, y: endPt.y});
            }

            // --- 2. Fusionar vértices muy cercanos (tolerancia 1 píxel) ---
            const TOL = 1.0; // píxeles
            const merged = [];
            const mapIdx = new Array(rawVertices.length);
            for (let i = 0; i < rawVertices.length; i++) {
                const pt = rawVertices[i];
                let found = -1;
                for (let j = 0; j < merged.length; j++) {
                    if (Math.hypot(merged[j].x - pt.x, merged[j].y - pt.y) < TOL) {
                        found = j;
                        break;
                    }
                }
                if (found === -1) {
                    mapIdx[i] = merged.length;
                    merged.push({x: pt.x, y: pt.y});
                } else {
                    mapIdx[i] = found;
                }
            }

            // Cada segmento original aporta una arista entre los índices fusionados de sus dos extremos.
            for (let k = 0; k < segs.length; k++) {
                const seg = segs[k];
                const startIdx = mapIdx[k * 2];
                const endIdx = mapIdx[k * 2 + 1];
                if (startIdx === endIdx) continue; // ignorar aristas de longitud cero
                edges.push(segmentToEdge(seg, startIdx, endIdx));
            }

            // --- 4. Cerrar la figura si el primer y último vértice están muy cerca ---
            if (merged.length > 1 && Math.hypot(merged[0].x - merged[merged.length - 1].x, merged[0].y - merged[merged.length - 1].y) < TOL) {
                // Fusionar el último con el primero
                const lastIdx = merged.length - 1;            
                for (let i = 0; i < edges.length; i++) {
                    if (edges[i].start === lastIdx) edges[i].start = 0;
                    if (edges[i].end === lastIdx) edges[i].end = 0;
                }
            
                merged.pop();
                // Corregir índices mayores
                for (let i = 0; i < edges.length; i++) {
                    if (edges[i].start > lastIdx) edges[i].start--;
                    if (edges[i].end > lastIdx) edges[i].end--;
                }
            }

            return {
            vertices: merged,
            edges,
            closed: true,
            grain: null   
            };
        }
        //segtofigure fin

        // Lado A: fig segs + corte inverso (de S a E)
        const corteInv = cutInterior.map(seg => invertirSegmento(seg)).reverse();
        if (corteInv.length > 0) {
            corteInv[0] = fijarStartpoint(corteInv[0], hitS.pt);
            corteInv[corteInv.length - 1] = fijarEndpoint(corteInv[corteInv.length - 1], hitE.pt);
        }
        const fig1 = segsToFigure([...segsLadoA, ...corteInv]);

        // Lado B: fig segs + corte directo (de E a S)
        const fig2 = segsToFigure([...segsLadoB, ...cutInterior]);

        if (fig1.vertices.length < 3 || fig2.vertices.length < 3) return null;
        return [fig1, fig2];
    }

    // cero en el segmento donde ocurre el cruce, y devuelve UNA sola figura (no divide en 2).
    function splitWithStrokePartial(figure, cutData, hitE, innerEnd) {
        const figSegs = figure.edges.map(e => edgeToSegment(figure, e));
        const cutSegs = cutData.edges.map(e => edgeToSegment(cutData, e));

        // en ese orden (entrada -> punta).
        let cutPath;
        if (hitE.cutEdgeIdx === innerEnd.cutEdgeIdx) {
            const seg = cutSegs[hitE.cutEdgeIdx];
            const tA = Math.min(hitE.t_cut, innerEnd.t_cut);
            const tB = Math.max(hitE.t_cut, innerEnd.t_cut);
            const spA = subdivideSegment(seg, tA);
            const tRelB = (tB - tA) / (1 - tA);
            const spB = subdivideSegment(spA.right, tRelB);
            cutPath = [spB.left];
            if (innerEnd.t_cut < hitE.t_cut) {
                cutPath = cutPath.map(invertirSegmento).reverse();
            }
        } else {
            const path = [];
            const inc = (innerEnd.cutEdgeIdx > hitE.cutEdgeIdx) ? 1 : -1;
            const firstSeg = cutSegs[hitE.cutEdgeIdx];
            const spFirst = subdivideSegment(firstSeg, hitE.t_cut);
            path.push(inc === 1 ? spFirst.right : spFirst.left);
            for (let ci = hitE.cutEdgeIdx + inc; ci !== innerEnd.cutEdgeIdx; ci += inc) {
                path.push(cutSegs[ci]);
            }
            const lastSeg = cutSegs[innerEnd.cutEdgeIdx];
            const spLast = subdivideSegment(lastSeg, innerEnd.t_cut);
            path.push(inc === 1 ? spLast.left : spLast.right);
            if (inc === -1) {
                path.reverse();
                for (let i = 0; i < path.length; i++) path[i] = invertirSegmento(path[i]);
            }
            cutPath = path;
        }

        if (cutPath.length === 0) return null;
        cutPath[0] = fijarStartpoint(cutPath[0], hitE.pt);
        cutPath[cutPath.length - 1] = fijarEndpoint(cutPath[cutPath.length - 1], innerEnd.pt);

        // Ida y vuelta: entra por cutPath, y vuelve por el mismo camino invertido (ancho cero)
        const vuelta = cutPath.map(invertirSegmento).reverse();
        const muesca = [...cutPath, ...vuelta];

        // Subdividir el segmento de la figura donde esta hitE, e insertar la muesca ahi
        const piezaSegs = [];
        for (let i = 0; i < figSegs.length; i++) {
            if (i === hitE.edgeIdx) {
                const sp = subdivideSegment(figSegs[i], hitE.t_fig);
                const left = fijarEndpoint(sp.left, hitE.pt);
                const right = fijarStartpoint(sp.right, hitE.pt);
                piezaSegs.push(left, ...muesca, right);
            } else {
                piezaSegs.push(figSegs[i]);
            }
        }

        return segmentsToFigureGrande(piezaSegs);
    }

    // Ensamblador segmentos -> figura {vertices, edges} (fusiona vertices cercanos y cierra la figura)
    function segmentsToFigureGrande(segs) {
        const rawVertices = [];
        const edges = [];
        for (const seg of segs) {
            const startPt = seg.pts[0];
            const endPt = seg.type === 'line' ? seg.pts[1] : seg.pts[2];
            rawVertices.push({x: startPt.x, y: startPt.y});
            rawVertices.push({x: endPt.x, y: endPt.y});
        }
        const TOL = 1.0;
        const merged = [];
        const mapIdx = new Array(rawVertices.length);
        for (let i = 0; i < rawVertices.length; i++) {
            const pt = rawVertices[i];
            let found = -1;
            for (let j = 0; j < merged.length; j++) {
                if (Math.hypot(merged[j].x - pt.x, merged[j].y - pt.y) < TOL) { found = j; break; }
            }
            if (found === -1) { mapIdx[i] = merged.length; merged.push({x: pt.x, y: pt.y}); }
            else mapIdx[i] = found;
        }
        for (let k = 0; k < segs.length; k++) {
            const seg = segs[k];
            const startIdx = mapIdx[k * 2], endIdx = mapIdx[k * 2 + 1];
            if (startIdx === endIdx) continue;
            edges.push(segmentToEdge(seg, startIdx, endIdx));
        }
        if (merged.length > 1 && Math.hypot(merged[0].x - merged[merged.length - 1].x, merged[0].y - merged[merged.length - 1].y) < TOL) {
            const lastIdx = merged.length - 1;
            for (let i = 0; i < edges.length; i++) {
                if (edges[i].start === lastIdx) edges[i].start = 0;
                if (edges[i].end === lastIdx) edges[i].end = 0;
            }
            merged.pop();
            for (let i = 0; i < edges.length; i++) {
                if (edges[i].start > lastIdx) edges[i].start--;
                if (edges[i].end > lastIdx) edges[i].end--;
            }
        }
        return { vertices: merged, edges, closed: true, grain: null };
    }
    // ===================== FIN CORTE PARCIAL =====================

    function splitQuadraticBezier(a, c, b, t){
        const p0 = { x: a.x + (c.x - a.x) * t, y: a.y + (c.y - a.y) * t };
        const p1 = { x: c.x + (b.x - c.x) * t, y: c.y + (b.y - c.y) * t };
        const pMid = { x: p0.x + (p1.x - p0.x) * t, y: p0.y + (p1.y - p0.y) * t };
        return {
            left:  { start: a, end: pMid, curved: true, controlX: p0.x, controlY: p0.y },
            right: { start: pMid, end: b, curved: true, controlX: p1.x, controlY: p1.y }
        };
    }

    // ========== INTERSECCIONES EXACTAS (del código pequeño) ==========

function lineLineIntersect(p0, p1, q0, q1) {
    const dx1 = p1.x - p0.x, dy1 = p1.y - p0.y;
    const dx2 = q1.x - q0.x, dy2 = q1.y - q0.y;
    const denom = dx1 * dy2 - dy1 * dx2;
    if (Math.abs(denom) < 1e-10) return null;
    const dx = q0.x - p0.x, dy = q0.y - p0.y;
    const t = (dx * dy2 - dy * dx2) / denom;
    const s = (dx * dy1 - dy * dx1) / denom;
    if (t < -1e-9 || t > 1 + 1e-9 || s < -1e-9 || s > 1 + 1e-9) return null;
    return { t_fig: Math.max(0, Math.min(1, t)), t_cut: Math.max(0, Math.min(1, s)) };
}

function closestTOnQuad(pt, p0, cp, p1, steps = 100) {
    let best = 0, bestDist = Infinity;
    for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        const x = (1-t)*(1-t)*p0.x + 2*(1-t)*t*cp.x + t*t*p1.x;
        const y = (1-t)*(1-t)*p0.y + 2*(1-t)*t*cp.y + t*t*p1.y;
        const d = Math.hypot(pt.x - x, pt.y - y);
        if (d < bestDist) { bestDist = d; best = t; }
    }
    return best;
}


function projectOntoLine(pt, a, b) {
    const dx = b.x - a.x, dy = b.y - a.y;
    const len2 = dx * dx + dy * dy;
    if (len2 < 1e-10) return 0;
    return ((pt.x - a.x) * dx + (pt.y - a.y) * dy) / len2;
}

    function applyCut() {
    if (cutLineIndices.length === 0) {
        showModal({title:'Error',body:'Selecciona al menos una línea de corte.',buttons:[{label:'OK'}]});
        return;
    }

    const cutData = buildCutEdges(cutLineIndices);
    if (cutData.vertices.length < 2) {
        showModal({title:'Error',body:'La línea de corte no tiene puntos suficientes.',buttons:[{label:'OK'}]});
        return;
    }

    let targetFi = -1;
    let bestCrossings = null;
    let partialInner = null; // {pt, cutEdgeIdx, t_cut}

    for (let fi = 0; fi < figures.length; fi++) {
        if (!figures[fi].closed) continue;
        if (cutLineIndices.includes(fi)) continue;
        const cx = findExactCrossings(figures[fi], cutData);
        if (cx.length >= 2) {
            targetFi = fi;
            bestCrossings = cx;
            break;
        }
    }

    // Corte parcial (1 cruce + un extremo dentro)
    if (targetFi === -1) {
        for (let fi = 0; fi < figures.length; fi++) {
            if (!figures[fi].closed) continue;
            if (cutLineIndices.includes(fi)) continue;
            const cx = findExactCrossings(figures[fi], cutData);
            if (cx.length === 1) {
                const firstPt = cutData.vertices[0];
                const lastPt = cutData.vertices[cutData.vertices.length - 1];
                if (isPointInPolygon(firstPt.x, firstPt.y, figures[fi])) {
                    targetFi = fi;
                    bestCrossings = cx;
                    partialInner = {pt: firstPt, cutEdgeIdx: 0, t_cut: 0};
                    break;
                } else if (isPointInPolygon(lastPt.x, lastPt.y, figures[fi])) {
                    targetFi = fi;
                    bestCrossings = cx;
                    partialInner = {pt: lastPt, cutEdgeIdx: cutData.edges.length - 1, t_cut: 1};
                    break;
                }
            }
        }
    }

    if (targetFi === -1) {
        showModal({title:'Error',body:'La línea de corte no intersecta ninguna figura cerrada correctamente.',buttons:[{label:'OK'}]});
        return;
    }

    saveState();

    if (bestCrossings.length >= 2) {
        const result = splitWithStroke(figures[targetFi], cutData, bestCrossings);
        if (!result) {
            showModal({title:'Error',body:'No se pudo realizar el corte.',buttons:[{label:'OK'}]});
            return;
        }
        figures.splice(targetFi, 1, ...result);
    } else {
        // Se inserta una muesca de ancho cero y la figura permanece como UNA sola pieza.
        if (!partialInner) {
            showModal({title:'Error',body:'No se pudo realizar el corte parcial.',buttons:[{label:'OK'}]});
            return;
        }
        const hitE = bestCrossings[0];
        const resultado = splitWithStrokePartial(figures[targetFi], cutData, hitE, partialInner);
        if (!resultado || resultado.vertices.length < 3) {
            showModal({title:'Error',body:'No se pudo realizar el corte parcial.',buttons:[{label:'OK'}]});
            return;
        }
        figures[targetFi] = resultado;
    }

    cutLineIndices = [];
    document.getElementById('cutApplyBtn').style.display = 'none';
    setMode('none');
    redrawAll();
}
// applycut fin

    // ===================== CERRAR FIGURA =====================
    function applyCloseShape() {
    if (closeLineIndices.length < 1) {
        showModal({title:'Error',body:'Selecciona al menos una línea.',buttons:[{label:'OK'}]});
        return;
    }

    const THR = 20 / viewScale;

    // Construir segmentos con edges originales
    const segs = closeLineIndices.map(li => ({
        vertices: figures[li].vertices.map(v => ({x:v.x, y:v.y})),
        edges: figures[li].edges.map(e => Object.assign({}, e)),
        reversed: false,
        used: false
    }));

    // Encadenar por proximidad de extremos
    const ordered = [segs[0]];
    segs[0].used = true;

    let changed = true;
    while (changed) {
        changed = false;
        for (let i = 0; i < segs.length; i++) {
            if (segs[i].used) continue;
            const last  = ordered[ordered.length - 1];
            const first = ordered[0];
            const lastV  = last.reversed  ? last.vertices[0] : last.vertices[last.vertices.length - 1];
            const firstV = first.reversed ? first.vertices[first.vertices.length - 1] : first.vertices[0];
            const seg = segs[i];
            const sFirst = seg.vertices[0];
            const sLast  = seg.vertices[seg.vertices.length - 1];
            const dEF = Math.hypot(lastV.x - sFirst.x,  lastV.y - sFirst.y);
            const dEL = Math.hypot(lastV.x - sLast.x,   lastV.y - sLast.y);
            const dSF = Math.hypot(firstV.x - sFirst.x, firstV.y - sFirst.y);
            const dSL = Math.hypot(firstV.x - sLast.x,  firstV.y - sLast.y);
            const best = Math.min(dEF, dEL, dSF, dSL);
            if (best > THR) continue;
            const clone = {vertices: seg.vertices, edges: seg.edges, reversed: false, used: true};
            if      (best === dEF) { clone.reversed = false; ordered.push(clone); }
            else if (best === dEL) { clone.reversed = true;  ordered.push(clone); }
            else if (best === dSF) { clone.reversed = true;  ordered.unshift(clone); }
            else                   { clone.reversed = false; ordered.unshift(clone); }
            segs[i].used = true;
            changed = true;
        }
    }

    // Aplanar en vertices + edges preservando curvas
    const verts = [];
    const edges = [];

    for (const seg of ordered) {
        const vs = seg.reversed ? [...seg.vertices].reverse() : seg.vertices;
        const es = seg.reversed ? [...seg.edges].reverse()    : seg.edges;

        const offset = verts.length === 0 ? 0 : verts.length - 1;

        for (let vi = 0; vi < vs.length; vi++) {
            if (vi === 0 && verts.length > 0) continue;
            verts.push({x: vs[vi].x, y: vs[vi].y});
        }

        for (let ei = 0; ei < es.length; ei++) {
            const e = Object.assign({}, es[ei]);
            if (seg.reversed) {
                const tmp = e.start; e.start = e.end; e.end = tmp;
                // invertir controles cúbicos
                if (e.cubic && e.control2X != null) {
                    const tx = e.controlX,  ty = e.controlY;
                    e.controlX  = e.control2X; e.controlY  = e.control2Y;
                    e.control2X = tx;          e.control2Y = ty;
                }
            }
            e.start = offset + ei;
            e.end   = offset + ei + 1;
            edges.push(e);
        }
    }

    // Cerrar: conectar último vértice con el primero
    if (verts.length > 1 && Math.hypot(verts[0].x - verts[verts.length-1].x, verts[0].y - verts[verts.length-1].y) < THR) {
        verts.pop();
        edges[edges.length - 1].end = 0;
    } else {
        // agregar edge de cierre recto
        edges.push(makeEdge(verts.length - 1, 0));
    }

    saveState();
    const sortedIdx = [...closeLineIndices].sort((a,b)=>b-a);
    for (const idx of sortedIdx) figures.splice(idx, 1);
    figures.push({vertices: verts, edges, closed: true, grain: null, locked: false});
    closeLineIndices = [];
    document.getElementById('closeApplyBtn').style.display = 'none';
    setMode('none');
    redrawAll();
}

    // ===================== OPERACIONES =====================
    function addVertexOnEdge(fi,ei,x,y){
        const figure=figures[fi],edge=figure.edges[ei];
        const a=figure.vertices[edge.start],b=figure.vertices[edge.end];
        let newPoint,t;
        if(edge.curved&&edge.controlX!=null){
            const steps=100; let best=Infinity,bt=0;
            for(let i=0;i<=steps;i++){
                const tt=i/steps,xt=(1-tt)*(1-tt)*a.x+2*(1-tt)*tt*edge.controlX+tt*tt*b.x,yt=(1-tt)*(1-tt)*a.y+2*(1-tt)*tt*edge.controlY+tt*tt*b.y;
                const d=Math.hypot(x-xt,y-yt);if(d<best){best=d;bt=tt;newPoint={x:xt,y:yt};}
            }
            t=bt;
        } else {
            const c=closestOnLine(x,y,a.x,a.y,b.x,b.y);newPoint={x:c.x,y:c.y};t=c.t;
        }
        const nvi=edge.end;
        figure.vertices.splice(nvi,0,newPoint);
        figure.edges.forEach(e=>{if(e.start>=nvi)e.start++;if(e.end>=nvi)e.end++;});
        if(edge.curved&&edge.controlX!=null){
            const c1x=(1-t)*a.x+t*edge.controlX,c1y=(1-t)*a.y+t*edge.controlY;
            const c2x=(1-t)*edge.controlX+t*b.x, c2y=(1-t)*edge.controlY+t*b.y;
            edge.end=nvi;edge.controlX=c1x;edge.controlY=c1y;
            figure.edges.splice(ei+1,0,{start:nvi,end:nvi+1,curved:true,cubic:false,controlX:c2x,controlY:c2y,control2X:null,control2Y:null});
        }else{edge.end=nvi;figure.edges.splice(ei+1,0,makeEdge(nvi,nvi+1));}
    }

    function deleteVertex(fi, vi) {
        const fig = figures[fi];
        // Si la figura tiene solo 2 vértices, se elimina completa
        if (fig.vertices.length <= 2) {
            figures.splice(fi, 1);
            return;
        }

        const n = fig.vertices.length;
        const isClosed = fig.closed;
        const edges = fig.edges;

        // Encontrar aristas adyacentes
        let edgeIn = null, edgeOut = null;
        for (let ei = 0; ei < edges.length; ei++) {
            const e = edges[ei];
            if (e.end === vi) edgeIn = ei;
            if (e.start === vi) edgeOut = ei;
        }

        // Si no se encuentran ambas, es un extremo en figura abierta
        if (edgeIn === null || edgeOut === null) {
            // Eliminar el vértice y la arista que lo conecta
            const edgeIdx = edgeIn !== null ? edgeIn : edgeOut;
            if (edgeIdx !== null) {
                edges.splice(edgeIdx, 1);
                // Ajustar índices
                edges.forEach(e => {
                    if (e.start > vi) e.start--;
                    if (e.end > vi) e.end--;
                });
                fig.vertices.splice(vi, 1);
            }
        } else {
            // Fusionar las dos aristas en una
            const eIn = edges[edgeIn];
            const eOut = edges[edgeOut];
            const newStart = eIn.start;
            const newEnd = eOut.end;

            // Eliminar ambas aristas (primero la de mayor índice para no desordenar)
            if (edgeIn > edgeOut) {
                edges.splice(edgeIn, 1);
                edges.splice(edgeOut, 1);
            } else {
                edges.splice(edgeOut, 1);
                edges.splice(edgeIn, 1);
            }

            // Crear nueva arista recta (pierde curvatura)
            const newEdge = makeEdge(newStart, newEnd);
            // Insertar en la posición de la primera arista eliminada
            edges.splice(Math.min(edgeIn, edgeOut), 0, newEdge);

            // Eliminar el vértice
            fig.vertices.splice(vi, 1);

            // Ajustar índices en todas las aristas
            edges.forEach(e => {
                if (e.start > vi) e.start--;
                if (e.end > vi) e.end--;
            });
        }
    }

function edgeLength(fig, edge) {
    const a = fig.vertices[edge.start], b = fig.vertices[edge.end];
    const STEPS = 200;
    let len = 0, px = a.x, py = a.y;
    for (let i = 1; i <= STEPS; i++) {
        const t = i / STEPS;
        let x, y;
        if (edge.cubic && edge.control2X != null) {
            const mt = 1-t;
            x = mt*mt*mt*a.x + 3*mt*mt*t*edge.controlX + 3*mt*t*t*edge.control2X + t*t*t*b.x;
            y = mt*mt*mt*a.y + 3*mt*mt*t*edge.controlY + 3*mt*t*t*edge.control2Y + t*t*t*b.y;
        } else if (edge.curved && edge.controlX != null) {
            x = (1-t)*(1-t)*a.x + 2*(1-t)*t*edge.controlX + t*t*b.x;
            y = (1-t)*(1-t)*a.y + 2*(1-t)*t*edge.controlY + t*t*b.y;
        } else {
            x = a.x + (b.x-a.x)*t;
            y = a.y + (b.y-a.y)*t;
        }
        len += Math.hypot(x-px, y-py);
        px = x; py = y;
    }
    return len;
}

    function edgeMidAndNormal(fig, edge) {
        const a = fig.vertices[edge.start], b = fig.vertices[edge.end];
        let mx, my, tx, ty;
        if (edge.cubic && edge.control2X != null) {
            const t = 0.5, mt = 1 - t;
            mx = mt*mt*mt*a.x + 3*mt*mt*t*edge.controlX + 3*mt*t*t*edge.control2X + t*t*t*b.x;
            my = mt*mt*mt*a.y + 3*mt*mt*t*edge.controlY + 3*mt*t*t*edge.control2Y + t*t*t*b.y;
            tx = 3*mt*mt*(edge.controlX-a.x) + 6*mt*t*(edge.control2X-edge.controlX) + 3*t*t*(b.x-edge.control2X);
            ty = 3*mt*mt*(edge.controlY-a.y) + 6*mt*t*(edge.control2Y-edge.controlY) + 3*t*t*(b.y-edge.control2Y);
        } else if (edge.curved && edge.controlX != null) {
            const t = 0.5;
            mx = (1-t)*(1-t)*a.x + 2*(1-t)*t*edge.controlX + t*t*b.x;
            my = (1-t)*(1-t)*a.y + 2*(1-t)*t*edge.controlY + t*t*b.y;
            tx = 2*(1-t)*(edge.controlX-a.x) + 2*t*(b.x-edge.controlX);
            ty = 2*(1-t)*(edge.controlY-a.y) + 2*t*(b.y-edge.controlY);
        } else {
            mx = (a.x+b.x)/2; my = (a.y+b.y)/2;
            tx = b.x-a.x; ty = b.y-a.y;
        }
        const tlen = Math.hypot(tx,ty) || 1;
        return { mx, my, nx: -ty/tlen, ny: tx/tlen };
    }

    // Tamaño base de la fuente de medidas: un poco más grande solo en celular (touch),

    // Puntos (vértices visuales) del inicio y del extremo actual mientras se dibuja una línea nueva.
    function drawLineDrawingVertices() {

    function resizeEdge(fi,ei,newPx,clickX,clickY){
        const figure=figures[fi],edge=figure.edges[ei];
        const a=figure.vertices[edge.start],b=figure.vertices[edge.end];
        const cur=edgeLength(figure, edge);if(!cur)return;        
        const moveB=Math.hypot(clickX-b.x,clickY-b.y)<Math.hypot(clickX-a.x,clickY-a.y);
        const sf=newPx/cur;
        if(moveB){
            const dx=b.x-a.x,dy=b.y-a.y;b.x=a.x+dx*sf;b.y=a.y+dy*sf;
            if(edge.controlX !=null){edge.controlX =a.x+(edge.controlX -a.x)*sf;edge.controlY =a.y+(edge.controlY -a.y)*sf;}
            if(edge.control2X!=null){edge.control2X=a.x+(edge.control2X-a.x)*sf;edge.control2Y=a.y+(edge.control2Y-a.y)*sf;}
        }else{
            const dx=a.x-b.x,dy=a.y-b.y;a.x=b.x+dx*sf;a.y=b.y+dy*sf;
            if(edge.controlX !=null){edge.controlX =b.x+(edge.controlX -b.x)*sf;edge.controlY =b.y+(edge.controlY -b.y)*sf;}
            if(edge.control2X!=null){edge.control2X=b.x+(edge.control2X-b.x)*sf;edge.control2Y=b.y+(edge.control2Y-b.y)*sf;}
        }
    }

    function rotateFigure(fi,deg){
        const f=figures[fi],c=getCentroid(f),rad=deg*Math.PI/180,cos=Math.cos(rad),sin=Math.sin(rad);
        function rot(x,y){const dx=x-c.x,dy=y-c.y;return{x:c.x+dx*cos-dy*sin,y:c.y+dx*sin+dy*cos};}
        f.vertices.forEach(v=>{const r=rot(v.x,v.y);v.x=r.x;v.y=r.y;});
        f.edges.forEach(e=>{
            if(e.controlX !=null){const r=rot(e.controlX,e.controlY);  e.controlX=r.x; e.controlY=r.y;}
            if(e.control2X!=null){const r=rot(e.control2X,e.control2Y);e.control2X=r.x;e.control2Y=r.y;}
        });
    }

    function duplicateFigure(fi,ox=100,oy=100){

    function reflectFigure(fi,ox=100,oy=0){

                control2X:e.control2X!=null?2*c.x-e.control2X+ox:null,control2Y:e.control2Y!=null?e.control2Y+oy:null})),
            closed:o.closed,grain:o.grain
        });
