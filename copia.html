    //unfildfigureinplace ======
    function unfoldFigureInPlace(figure, hei) {
    if (!figure.closed) return;               // solo figuras cerradas

    const V = figure.vertices;
    const E = figure.edges;
    const n = E.length;
    const hinge = E[hei];

    const A = V[hinge.start];                 // extremo del eje
    const B = V[hinge.end];

    // ── 1. Recoger las aristas del camino B → A (todas menos la bisagra) ──
    const otherEdges = [];
    for (let i = 1; i < n; i++) {
        otherEdges.push(E[(hei + i) % n]);
    }
    // otherEdges[0] empieza en B, otherEdges[last] termina en A

    // ── 2. Construir la secuencia de vértices del lado original (B … A) ──
    const origVertices = [B];                  // índice 0 nuevo
    for (const e of otherEdges) {
        const endV = V[e.end];
        // evita duplicar A (se añade al final exactamente una vez)
        origVertices.push(endV);
    }
    // origVertices[0]=B, origVertices[last]=A

    // ── 3. Reflejo de un punto respecto al eje AB ──
    function reflect(pt) {
        const dx = B.x - A.x, dy = B.y - A.y;
        const len2 = dx * dx + dy * dy;
        if (len2 < 1e-12) return { x: pt.x, y: pt.y };
        const t = ((pt.x - A.x) * dx + (pt.y - A.y) * dy) / len2;
        const fx = A.x + t * dx;
        const fy = A.y + t * dy;
        return { x: 2 * fx - pt.x, y: 2 * fy - pt.y };
    }

    // ── 4. Crear aristas reflejadas (invertidas) en orden inverso ──
    const reflectedEdges = [];
    // Recorremos otherEdges al revés para que el camino reflejado vaya de A a B
    for (let i = otherEdges.length - 1; i >= 0; i--) {
        const orig = otherEdges[i];
        const startOrig = V[orig.start];
        const endOrig   = V[orig.end];

        // Reflejar extremos y puntos de control
        const rStart = reflect(endOrig);   
        const rEnd   = reflect(startOrig); 

        let newEdge = {
            start: -1, end: -1,          
            curved: orig.curved,
            cubic: orig.cubic,
            controlX: null,
            controlY: null,
            control2X: null,
            control2Y: null
        };

        if (orig.cubic && orig.control2X != null) {
            const cp1 = reflect({ x: orig.controlX,  y: orig.controlY });
            const cp2 = reflect({ x: orig.control2X, y: orig.control2Y });
            newEdge.controlX  = cp2.x;
            newEdge.controlY  = cp2.y;
            newEdge.control2X = cp1.x;
            newEdge.control2Y = cp1.y;
        } else if (orig.curved && orig.controlX != null) {
            const cp = reflect({ x: orig.controlX, y: orig.controlY });
            newEdge.controlX = cp.x;
            newEdge.controlY = cp.y;
        }

        // Guardamos las coordenadas reales de los extremos para luego casarlos con vértices
        reflectedEdges.push({
            edge: newEdge,
            rStart: rStart,   
            rEnd: rEnd     
        });
    }

    // ── 5. Construir la nueva lista de vértices ──
    const newVertices = [];
    const mapOrig = new Map();   // viejo índice de vértice → nuevo índice (solo lado original)

    newVertices.push({ x: B.x, y: B.y });        // idx 0
    mapOrig.set(hinge.start, 0);                 
    // Corregir el mapeo: B es V[hinge.end]
    mapOrig.clear();
    mapOrig.set(hinge.end, 0);                   // B

    // Insertar los vértices intermedios y A
    for (let i = 1; i < origVertices.length; i++) {
        const v = origVertices[i];
        newVertices.push({ x: v.x, y: v.y });
        const edge = otherEdges[i - 1];
        const origIdx = edge.end;
        if (!mapOrig.has(origIdx)) mapOrig.set(origIdx, newVertices.length - 1);
    }
    // El último vértice insertado es A, que corresponde a hinge.start
    mapOrig.set(hinge.start, newVertices.length - 1); // A

    for (let i = 0; i < reflectedEdges.length - 1; i++) {
        const pt = reflectedEdges[i].rEnd;
        newVertices.push({ x: pt.x, y: pt.y });
    }

    // ── 6. Construir las nuevas aristas ──
    const newEdges = [];

    // a) Aristas del lado original
    for (const e of otherEdges) {
        const sNew = mapOrig.get(e.start);
        const eNew = mapOrig.get(e.end);
        newEdges.push({
            start: sNew,
            end: eNew,
            curved: e.curved,
            cubic: e.cubic,
            controlX: e.controlX,
            controlY: e.controlY,
            control2X: e.control2X,
            control2Y: e.control2Y
        });
    }

    // El inicio de la primera arista reflejada es A (índice mapOrig.get(hinge.start))
    const idxA = mapOrig.get(hinge.start);
    let prevIdx = idxA; // comienza en A

    // su índice base = newVertices.length - (reflectedEdges.length - 1)  (porque el último es B no añadido)
    const baseRefl = newVertices.length - (reflectedEdges.length - 1);

    for (let i = 0; i < reflectedEdges.length; i++) {
        const re = reflectedEdges[i];
        let endIdx;
        if (i === reflectedEdges.length - 1) {
            endIdx = 0; // termina en B (índice 0)
        } else {
            endIdx = baseRefl + i; // vértice reflejado i-ésimo
        }
        newEdges.push({
            start: prevIdx,
            end: endIdx,
            curved: re.edge.curved,
            cubic: re.edge.cubic,
            controlX: re.edge.controlX,
            controlY: re.edge.controlY,
            control2X: re.edge.control2X,
            control2Y: re.edge.control2Y
        });
        prevIdx = endIdx;
    }

    // ── 7. Sustituir la figura ──
    figure.vertices = newVertices;
    figure.edges = newEdges;
    figure.closed = true;   // ya lo está, pero por claridad
} //unfildfigureinplace fin

    // ===================== UNIÃ¯Â¿Â½N DE CURVAS =====================
    function edgeToCubicControls(figure,edge){
        const a=figure.vertices[edge.start],b=figure.vertices[edge.end];
        if(edge.cubic&&edge.control2X!=null) return{cp1:{x:edge.controlX,y:edge.controlY},cp2:{x:edge.control2X,y:edge.control2Y}};
        if(edge.curved&&edge.controlX!=null) return q2c(a,{x:edge.controlX,y:edge.controlY},b);
        return{cp1:{x:a.x+(b.x-a.x)/3,y:a.y+(b.y-a.y)/3},cp2:{x:a.x+2*(b.x-a.x)/3,y:a.y+2*(b.y-a.y)/3}};
    }
    function joinCubics(cubics){return{P0:cubics[0].P0,CP1:cubics[0].CP1,CP2:cubics[cubics.length-1].CP2,Pn:cubics[cubics.length-1].P3};}

    function isContiguousCyclic(indices, n) {
        if (indices.length === 0) return false;
        if (indices.length === 1) return true;
        let consecutive = true;
        for (let i=1; i<indices.length; i++) if (indices[i] !== indices[i-1] + 1) { consecutive = false; break; }
        if (consecutive) return true;
        let wrap = true;
        for (let i=0; i<indices.length; i++) if (indices[i] !== (indices[0] + i) % n) { wrap = false; break; }
        return wrap;
    }

    function applyJoinCurves(){
        if(joinSelection.length<2){showModal({title:'Unir curvas',body:'Selecciona al menos 2 curvas.',buttons:[{label:'OK'}]});return;}
        const byFigure={};
        joinSelection.forEach(s=>{if(!byFigure[s.figureIndex])byFigure[s.figureIndex]=[];byFigure[s.figureIndex].push(s.edgeIndex);});
        saveState();
        for (const fiStr in byFigure) {
            const fi = parseInt(fiStr), figure = figures[fi], edgeIndices = byFigure[fi].sort((a,b)=>a-b), n = figure.edges.length;
            if (!isContiguousCyclic(edgeIndices, n)) { showModal({title:'Error',body:'Las curvas deben ser consecutivas (incluso cíclicamente).',buttons:[{label:'OK'}]}); return; }
            let orderedIndices = [...edgeIndices];
            const minIdx = orderedIndices[0];
            orderedIndices = [];
            for (let i=0; i<edgeIndices.length; i++) orderedIndices.push((minIdx + i) % n);
            const cubics = orderedIndices.map(ei => {
                const edge = figure.edges[ei], a = figure.vertices[edge.start], b = figure.vertices[edge.end];
                return {P0:a, CP1:edgeToCubicControls(figure,edge).cp1, CP2:edgeToCubicControls(figure,edge).cp2, P3:b};
            });
            const joined = joinCubics(cubics);
            const firstE = figure.edges[orderedIndices[0]], lastE = figure.edges[orderedIndices[orderedIndices.length-1]];
            const endVIdx = lastE.end;
            const intermediateVerts = [];
            for (let k=1; k<orderedIndices.length; k++) intermediateVerts.push(figure.edges[orderedIndices[k-1]].end);
            const edgesToRemove = orderedIndices.slice(1).sort((a,b)=>b-a);
            for (const ei of edgesToRemove) figure.edges.splice(ei, 1);
            figure.edges.forEach(e => { for (const ei of edgesToRemove) { if (e.start > ei) e.start--; if (e.end > ei) e.end--; } });
            let removedBefore = edgesToRemove.filter(x => x < orderedIndices[0]).length;
            const currentIdx = orderedIndices[0] - removedBefore;
            const finalEdge = figure.edges[currentIdx];
            const vertsToRemove = intermediateVerts.sort((a,b)=>b-a);
            for (const vi of vertsToRemove) {
                figure.vertices.splice(vi, 1);
                figure.edges.forEach(e => { if (e.start > vi) e.start--; if (e.end > vi) e.end--; });
            }
            finalEdge.end = endVIdx - vertsToRemove.filter(v => v < endVIdx).length;
            finalEdge.curved = true; finalEdge.cubic = true;
            finalEdge.controlX = joined.CP1.x; finalEdge.controlY = joined.CP1.y;
            finalEdge.control2X = joined.CP2.x; finalEdge.control2Y = joined.CP2.y;
        }
        joinSelection=[]; redrawAll();
    }

    function applyOffset() {
        if (offsetEdges.length===0) { showModal({title:'Error',body:'Selecciona al menos una arista.',buttons:[{label:'OK'}]}); return; }
        const distCm = parseFloat(document.getElementById('offsetValue').value.replace(',','.'));
        if (isNaN(distCm)||distCm<=0) { showModal({title:'Valor inválido',body:'Introduce una distancia positiva en cm.',buttons:[{label:'OK'}]}); return; }
        saveState();
        const distPx = distCm * PX_PER_CM;
    
        const fi = offsetEdges[0].figureIndex;
        const fig = figures[fi];
    
        const sortedIndices = [...offsetEdges].sort((a,b)=>a.edgeIndex-b.edgeIndex).map(o=>o.edgeIndex);
    
        function isAdjPrev(i) {
            if (i===0) return false;
            return fig.edges[sortedIndices[i-1]].end === fig.edges[sortedIndices[i]].start;
        }
        function isAdjNext(i) {
            if (i===sortedIndices.length-1) return false;
            return fig.edges[sortedIndices[i]].end === fig.edges[sortedIndices[i+1]].start;
        }
    
        let area=0;
        for(let k=0;k<fig.vertices.length;k++){const v1=fig.vertices[k],v2=fig.vertices[(k+1)%fig.vertices.length];area+=(v1.x*v2.y-v2.x*v1.y);}
        const cw = area > 0;

        const offsets = sortedIndices.map(ei => {
            const edge = fig.edges[ei];
            const a = fig.vertices[edge.start];
            const b = fig.vertices[edge.end];
            const dx=b.x-a.x, dy=b.y-a.y, len=Math.hypot(dx,dy)||1;
            const n = cw ? {x: dy/len, y: -dx/len} : {x: -dy/len, y: dx/len};
            return {
                a2: {x: a.x+n.x*distPx, y: a.y+n.y*distPx},
                b2: {x: b.x+n.x*distPx, y: b.y+n.y*distPx},
                normal: n, edge
            };
        });

        // Resolver vértices compartidos: intersección de líneas desplazadas
        function lineIntersect(p1,p2,p3,p4){
            const d1x=p2.x-p1.x,d1y=p2.y-p1.y,d2x=p4.x-p3.x,d2y=p4.y-p3.y;
            const denom=d1x*d2y-d1y*d2x;
            if(Math.abs(denom)<1e-10) return null;
            const t=((p3.x-p1.x)*d2y-(p3.y-p1.y)*d2x)/denom;
            return {x:p1.x+t*d1x, y:p1.y+t*d1y};
        }
    
        for (let i=0; i<sortedIndices.length-1; i++) {
            if (isAdjNext(i)) {
                const inter = lineIntersect(offsets[i].a2, offsets[i].b2, offsets[i+1].a2, offsets[i+1].b2);
                if (inter) { offsets[i].b2=inter; offsets[i+1].a2=inter; }
            }
        }
    
        // Para adyacentes: el vértice compartido del medio se MUEVE, no se duplica
        const newVI = []; 
    
        // Primero recolectar qué vértices mover y cuáles crear
        const movedVertices = new Set();
    
        for (let i=0; i<sortedIndices.length; i++) {
            const edge = offsets[i].edge;
            if (isAdjPrev(i)) movedVertices.add(edge.start);
            if (isAdjNext(i)) movedVertices.add(edge.end);
        }
    
        // Mover vértices compartidos a su nueva posición
        for (let i=0; i<sortedIndices.length; i++) {
            const edge = offsets[i].edge;
            if (isAdjNext(i)) {
                // El vértice edge.end es compartido, moverlo
                fig.vertices[edge.end].x = offsets[i].b2.x;
                fig.vertices[edge.end].y = offsets[i].b2.y;
            }
        }
    
        // y construir tabla de índices
        for (let i=0; i<sortedIndices.length; i++) {
            const edge = offsets[i].edge;
            let startIdx, endIdx;
    
            if (isAdjPrev(i)) {
                // startIdx es el vértice compartido ya movido
                startIdx = edge.start;
            } else {
                startIdx = fig.vertices.length;
                fig.vertices.push({x: offsets[i].a2.x, y: offsets[i].a2.y});
            }
    
            if (isAdjNext(i)) {
                // endIdx es el vértice compartido ya movido
                endIdx = edge.end;
            } else {
                endIdx = fig.vertices.length;
                fig.vertices.push({x: offsets[i].b2.x, y: offsets[i].b2.y});
            }
    
            newVI.push({startIdx, endIdx});
        }

        // Insertar aristas en orden descendente
        for (let i=sortedIndices.length-1; i>=0; i--) {
            const ei = sortedIndices[i];
            const edge = offsets[i].edge;
            const {startIdx, endIdx} = newVI[i];
            const normal = offsets[i].normal;
    
            const newParallel = {
                start: startIdx, end: endIdx,
                curved: edge.curved, cubic: edge.cubic,
                controlX: edge.curved&&edge.controlX!=null ? edge.controlX+normal.x*distPx : null,
                controlY: edge.curved&&edge.controlY!=null ? edge.controlY+normal.y*distPx : null,
                control2X: edge.cubic&&edge.control2X!=null ? edge.control2X+normal.x*distPx : null,
                control2Y: edge.cubic&&edge.control2Y!=null ? edge.control2Y+normal.y*distPx : null
            };
    
            const replacement = [];
            if (!isAdjPrev(i)) replacement.push(makeEdge(edge.start, startIdx));
            replacement.push(newParallel);
            if (!isAdjNext(i)) replacement.push(makeEdge(endIdx, edge.end));
    
            fig.edges.splice(ei, 1, ...replacement);
        }
    
        offsetEdges=[];
        hidePanel('offsetInputs');
        selectedEdge=null;
        redrawAll();
    }

    // ===================== CURVA MIDPOINT DRAG =====================
    // Calcula el punto de control cuadrático a partir del punto medio donde arrastra el usuario
    function controlFromMidpoint(p0, pm, p2) {
        return {
            x: (pm.x - 0.25*p0.x - 0.25*p2.x) / 0.5,
            y: (pm.y - 0.25*p0.y - 0.25*p2.y) / 0.5
        };
    }

    // ===================== MOVER ARISTA / LADO =====================
    // preservando su forma relativa. Misma lógica usada en el arrastre de vértices.
    function edgeMoveAdjustNeighbor(fig, vi, oldPos, excludeEdge) {
        fig.edges.forEach(e => {
            if (e === excludeEdge) return;
            if (e.controlX != null && (e.start === vi || e.end === vi)) {
                const a = fig.vertices[e.start], b = fig.vertices[e.end];
                const oldA = e.start === vi ? oldPos : a;
                const oldB = e.end === vi ? oldPos : b;
                const denom = Math.hypot(oldB.x - oldA.x, oldB.y - oldA.y);
                if (denom > 0.01) {
                    const tx = ((e.controlX - oldA.x) * (oldB.x - oldA.x) + (e.controlY - oldA.y) * (oldB.y - oldA.y)) / (denom * denom);
                    const ty = ((e.controlY - oldA.y) * (oldB.x - oldA.x) - (e.controlX - oldA.x) * (oldB.y - oldA.y)) / (denom * denom);
                    e.controlX = a.x + tx * (b.x - a.x) - ty * (b.y - a.y);
                    e.controlY = a.y + tx * (b.y - a.y) + ty * (b.x - a.x);
                }
            }
        });
    }

    // ===================== DIBUJO =====================
    function redrawAll(){
        const dpr = window.devicePixelRatio || 1;
        ctx.setTransform(1,0,0,1,0,0);
        ctx.clearRect(0,0,canvas.width,canvas.height);

                    ctx.strokeStyle = '#b30000'; ctx.lineWidth = 2/viewScale;

                        const a = line.vertices[e.start], b = line.vertices[e.end];

                        else if(e.curved&&e.controlX!=null) ctx.quadraticCurveTo(e.controlX,e.controlY,b.x,b.y);
                        else ctx.lineTo(b.x,b.y);
                        ctx.stroke();
                    });
                    ctx.restore();
                }
            });
        }
        // Resaltar lineas para cerrar figura
        if(mode==='closeShape') {
            closeLineIndices.forEach(li => {
                const line = figures[li];
                if (line) {
                    ctx.save();
                    ctx.strokeStyle = '#8e44ad'; ctx.lineWidth = 2/viewScale;
                    ctx.setLineDash([2/viewScale, 2/viewScale]);
                    line.edges.forEach(e => {
                        const a = line.vertices[e.start], b = line.vertices[e.end];
                        ctx.beginPath(); ctx.moveTo(a.x,a.y);
                        if(e.curved&&e.controlX!=null) ctx.quadraticCurveTo(e.controlX,e.controlY,b.x,b.y);
                        else ctx.lineTo(b.x,b.y);
                        ctx.stroke();
                    });
                    ctx.restore();
                }
            });
        }
        if(mode==='offset') {
    offsetEdges.forEach(oe => {

        if(e.cubic&&e.control2X!=null) ctx.bezierCurveTo(e.controlX,e.controlY,e.control2X,e.control2Y,b.x,b.y);
        else if(e.curved&&e.controlX!=null) ctx.quadraticCurveTo(e.controlX,e.controlY,b.x,b.y);
        else ctx.lineTo(b.x,b.y);
        ctx.stroke();

    });
}
        // Resaltar aristas seleccionadas en modo cambiar longitud (multi-selección)
        if(mode==='resize') {
            resizeEdges.forEach(re => {

                ctx.bezierCurveTo(e.controlX,e.controlY,e.control2X,e.control2Y,b.x,b.y);

                else ctx.lineTo(b.x,b.y);

                ctx.restore();

        }

        // ===== Medidas finas de arista(s) tocada(s) / afectada(s) =====
        // 1) Modo vértice: medir solo las aristas que llegan al vértice activo (seleccionado o en arrastre)
        if (mode==='vertex') {

                });
            }
        }
        // 2) Modo resize: las aristas seleccionadas (una o varias) + suma total si hay más de una
        if (mode==='resize' && resizeEdges.length>0) {
            let totalPx = 0;
            resizeEdges.forEach(re => {
                const rfig = figures[re.figureIndex];
                if (rfig) {
                    const edge = rfig.edges[re.edgeIndex];
                    drawEdgeLengthLabel(rfig, edge);
                    totalPx += edgeLength(rfig, edge);
                }
            });
            if (resizeEdges.length > 1) drawResizeSumLabel(totalPx);
        }
        // 3) Modo curva: la arista que se está curvando
        if (mode==='curve' && curveActiveDrag && figures[curveActiveDrag.figureIndex]) {
            drawEdgeLengthLabel(figures[curveActiveDrag.figureIndex], figures[curveActiveDrag.figureIndex].edges[curveActiveDrag.edgeIndex]);
        }
        // 4) Modo offset: las aristas seleccionadas
        if (mode==='offset') {
            offsetEdges.forEach(oe => {
                const ofig = figures[oe.figureIndex];
                if (ofig) drawEdgeLengthLabel(ofig, ofig.edges[oe.edgeIndex]);
            });
        }
        // 5) Modo cortar: las líneas de corte seleccionadas (todas sus aristas)
        if (mode==='cut') {
            cutLineIndices.forEach(li => {
                const lfig = figures[li];
                if (lfig) lfig.edges.forEach(e => drawEdgeLengthLabel(lfig, e));
            });
        }
        // 6) Modo cerrar figura: las líneas seleccionadas
        if (mode==='closeShape') {
            closeLineIndices.forEach(li => {
                const lfig = figures[li];
                if (lfig) lfig.edges.forEach(e => drawEdgeLengthLabel(lfig, e));
            });
        }
        // 7) Modo unir curvas: las curvas seleccionadas
        if (mode==='joinCurves') {
            joinSelection.forEach(s => {
                const jfig = figures[s.figureIndex];
                if (jfig) drawEdgeLengthLabel(jfig, jfig.edges[s.edgeIndex]);
            });
        }
        // 8) Modo línea: puntos de inicio/actual + medida mientras se arrastra para crear una línea nueva
        if (mode==='line' && lineStartPoint) {
            drawLineDrawingVertices();
            if (dragData && dragData.type==='line' && dragData.currentPoint) {
                drawLengthLabelForPoints(lineStartPoint, dragData.currentPoint);
            }
        }
        // 9) Modo mover arista: medida de la arista que se está moviendo
        if (mode==='edgeMove' && dragData && dragData.type==='edgeMove' && figures[dragData.figureIndex]) {
            const efig = figures[dragData.figureIndex];
            drawEdgeLengthLabel(efig, efig.edges[dragData.edgeIndex]);
        }
    }

    function drawFigure(figure,fi){
        ctx.save();
        // Todas las figuras (abiertas o cerradas) con el mismo estilo negro
        ctx.strokeStyle = figure.locked ? '#8e0000' : '#000';
        ctx.lineWidth = figure.locked ? 3/viewScale : 2/viewScale;
        ctx.setLineDash([]);

        figure.edges.forEach((e,ei)=>{
            const a=figure.vertices[e.start],b=figure.vertices[e.end];
            const selJoin = mode==='joinCurves' && joinSelection.some(s=>s.figureIndex===fi&&s.edgeIndex===ei);
            ctx.beginPath();ctx.moveTo(a.x,a.y);
            if(e.cubic&&e.control2X!=null) ctx.bezierCurveTo(e.controlX,e.controlY,e.control2X,e.control2Y,b.x,b.y);
            else if(e.curved&&e.controlX!=null) ctx.quadraticCurveTo(e.controlX,e.controlY,b.x,b.y);
            else ctx.lineTo(b.x,b.y);
            if(selJoin){ ctx.strokeStyle='#d10000'; ctx.lineWidth=2/viewScale; ctx.stroke(); ctx.strokeStyle='#000'; ctx.lineWidth=2/viewScale; }
            else ctx.stroke();
        });
        ctx.restore();
    }

    function drawGrainArrow(figure){
        const c=getCentroid(figure),grain=figure.grain;if(!grain)return;
        const len=28/viewScale,hs=7/viewScale;
        ctx.save();ctx.strokeStyle='#1565c0';ctx.fillStyle='#1565c0';ctx.lineWidth=2/viewScale;
        const dx=grain==='horizontal'?1:0,dy=grain==='horizontal'?0:1;
        const x1=c.x-dx*len,y1=c.y-dy*len,x2=c.x+dx*len,y2=c.y+dy*len;
        ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
        function head(tx,ty,dirX,dirY){const px=-dirY,py=dirX;ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(tx-dirX*hs+px*hs*0.45,ty-dirY*hs+py*hs*0.45);ctx.lineTo(tx-dirX*hs-px*hs*0.45,ty-dirY*hs-py*hs*0.45);ctx.closePath();ctx.fill();}
        head(x2,y2, dx, dy);head(x1,y1,-dx,-dy);
        ctx.restore();
    }

    function drawAllVertices(){
        const r=2.5/viewScale;
        figures.forEach((fig,fi)=>{fig.vertices.forEach((v,vi)=>{
            const isSel = selectedVertex && selectedVertex.figureIndex===fi && selectedVertex.vertexIndex===vi;
            ctx.beginPath();ctx.arc(v.x,v.y,r,0,Math.PI*2);
            ctx.fillStyle = isSel ? '#00c918' : '#0019d9';
            ctx.fill();
            ctx.strokeStyle = isSel ? '#00c918' : '#0019d9';
            ctx.lineWidth=1.5/viewScale;ctx.stroke();
        });});
    }

    function drawResizeIndicator(){
        if(!selectedEdge)return;
        const fig=figures[selectedEdge.figureIndex],edge=fig.edges[selectedEdge.edgeIndex];
        const a=fig.vertices[edge.start],b=fig.vertices[edge.end],r=3/viewScale;
        const moveB=Math.hypot(selectedEdge.clickX-b.x,selectedEdge.clickY-b.y)<Math.hypot(selectedEdge.clickX-a.x,selectedEdge.clickY-a.y);
        const mv=moveB?b:a,fx=moveB?a:b;
        ctx.beginPath();ctx.arc(fx.x,fx.y,r,0,Math.PI*2);ctx.fillStyle='#27ae60';ctx.fill();
        ctx.beginPath();ctx.arc(mv.x,mv.y,r,0,Math.PI*2);ctx.fillStyle='#e74c3c';ctx.fill();
        document.getElementById('resizeIndicator').textContent='? extremo '+(moveB?'B':'A')+' (rojo)';
    }

    // Etiqueta de la suma total de las aristas seleccionadas en modo cambiar longitud (multi-selección)
    function drawResizeSumLabel(totalPx){
        let sx=0, sy=0, n=0;
        resizeEdges.forEach(re=>{
            const fig=figures[re.figureIndex];
            if(!fig) return;
            const edge=fig.edges[re.edgeIndex];
            const {mx,my}=edgeMidAndNormal(fig, edge);
            sx+=mx; sy+=my; n++;
        });
        if(n===0) return;
        const cx=sx/n, cy=sy/n;
        const text='Total: '+pxToCm(totalPx).toFixed(1)+' cm';
        ctx.save();
        ctx.font=getMeasureFontSize()+'px sans-serif';
        ctx.fillStyle='#444';
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        ctx.globalAlpha=0.9;
        ctx.fillText(text, cx, cy - 20/viewScale);
        ctx.restore();
    }

    // ===================== EVENTOS =====================
    canvas.addEventListener('touchstart',e=>{isTouchDevice=true;handleTouchStart(e);},{passive:false});
    canvas.addEventListener('touchmove', handleTouchMove,{passive:false});
    canvas.addEventListener('touchend',  handleTouchEnd, {passive:true});
    canvas.addEventListener('mousedown', e=>{if(!isTouchDevice)handleMouseDown(e);});
    canvas.addEventListener('mousemove', e=>{if(!isTouchDevice)handleMouseMove(e);});
    canvas.addEventListener('mouseup',   e=>{if(!isTouchDevice)handleMouseUp(e);});
    canvas.addEventListener('mouseleave',e=>{if(!isTouchDevice)handleMouseLeave(e);});
    canvas.addEventListener('contextmenu',e=>e.preventDefault());

    function getPos(e){
        const r=canvas.getBoundingClientRect();
        const sx=(e.clientX!==undefined?e.clientX:(e.touches&&e.touches[0].clientX))-r.left;
        const sy=(e.clientY!==undefined?e.clientY:(e.touches&&e.touches[0].clientY))-r.top;
        return{sx,sy,...screenToWorld(sx,sy)};
    }

    function handleTouchStart(e){
        if(e.touches.length===1){
            e.preventDefault();
            if(mode==='none') return;
            const pos=getPos(e);
            const now=Date.now();
            if(now-lastTouchTime<300){applyZoom(-1,pos.sx,pos.sy);lastTouchTime=0;return;}
            lastTouchTime=now;
            handlePointerDown(pos);
        } else if(e.touches.length===2){
            pinchStartDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
            pinchStartScale=viewScale;dragData=null;pinchLastCx=null;pinchLastCy=null;
        }
    }

    function handleTouchMove(e){
    if(e.touches.length===2&&pinchStartDist!==null){
        e.preventDefault();
        const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
        const cx=(e.touches[0].clientX+e.touches[1].clientX)/2,cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
        const r=canvas.getBoundingClientRect();
        const ns=Math.min(10,Math.max(0.01,pinchStartScale*(dist/pinchStartDist)));
        viewOffX=(cx-r.left)-(cx-r.left-viewOffX)*(ns/viewScale);
        viewOffY=(cy-r.top )-(cy-r.top -viewOffY)*(ns/viewScale);
        viewScale=ns;
        if(pinchLastCx!==null){
            viewOffX+=(cx-r.left)-pinchLastCx;
            viewOffY+=(cy-r.top)-pinchLastCy;
        }
        pinchLastCx=(cx-r.left); pinchLastCy=(cy-r.top);
        updateZoomIndicator();redrawAll();
    } else if(e.touches.length===1){
        e.preventDefault();
        if(mode==='line' && dragData && dragData.type==='line'){
            const pos=getPos(e);
            dragData.currentPoint = {x: pos.x, y: pos.y};
            redrawAll();
            const dpr=window.devicePixelRatio||1;
            ctx.save();
            ctx.setTransform(dpr*viewScale,0,0,dpr*viewScale,dpr*viewOffX,dpr*viewOffY);
            ctx.beginPath(); ctx.moveTo(lineStartPoint.x, lineStartPoint.y); ctx.lineTo(pos.x, pos.y);
            ctx.strokeStyle='#000'; ctx.setLineDash([]); ctx.lineWidth=2/viewScale; ctx.stroke();
            ctx.restore();
        } else if(dragData||curveActiveDrag){
            handlePointerMove(getPos(e));
        }
    }
}

    function handleTouchEnd(e){
    if(e.touches.length<2){pinchStartDist=null;pinchLastCx=null;pinchLastCy=null;}
    if(e.touches.length===0){
        if(mode==='line' && dragData && dragData.type==='line'){
            const lastTouch = e.changedTouches[0];
            const r = canvas.getBoundingClientRect();
            const sx = lastTouch.clientX - r.left, sy = lastTouch.clientY - r.top;
            const wp = screenToWorld(sx, sy);
            let end = {x: wp.x, y: wp.y};
            if(snapEnabled) end = applySnap(end.x, end.y, -1, -1);
            if(lineStartPoint && Math.hypot(end.x-lineStartPoint.x, end.y-lineStartPoint.y) > 2/viewScale){
                saveState();
                figures.push(createLine(lineStartPoint, end));
            }
            lineStartPoint = null;
            dragData = null;
            redrawAll();
            return;
        }
        dragData=null; curveActiveDrag=null;
    }
}

    function handleMouseDown(e){
        e.preventDefault();
        const pos=getPos(e);
        if(e.button===1||e.button===2||(e.button===0&&e.altKey)){
            isPanning=true; panStart={x:pos.x,y:pos.y}; return;
        }
        handlePointerDown(pos);
    }

    function handleMouseMove(e){
        e.preventDefault();
        if(isPanning){
            const r=canvas.getBoundingClientRect();
            const sx=e.clientX-r.left,sy=e.clientY-r.top;
            const wp=screenToWorld(sx,sy);
            viewOffX+=( wp.x - panStart.x)*viewScale;
            viewOffY+=( wp.y - panStart.y)*viewScale;
            redrawAll();return;
        }
        handlePointerMove(getPos(e));
    }

    function handleMouseUp(e){
    e.preventDefault();
    isPanning=false;
    if(mode==='line' && dragData && dragData.type==='line'){
        const pos=getPos(e);
        let end = {x: pos.x, y: pos.y};
        if(snapEnabled) end = applySnap(end.x, end.y, -1, -1);
        if(lineStartPoint && Math.hypot(end.x-lineStartPoint.x, end.y-lineStartPoint.y) > 2/viewScale){
            saveState();
            figures.push(createLine(lineStartPoint, end));
        }
        lineStartPoint = null;
        dragData = null;
        redrawAll();
        return;
    }
    dragData=null;
    curveActiveDrag=null;
}

    function handleMouseLeave(e){
        isPanning=false;
        dragData=null;
        curveActiveDrag=null;
    }

    function handlePointerDown(pos){
        const wx=pos.x,wy=pos.y;

        if(mode==='lock'||mode==='delete'){
        } else {
            const fi=findClickedFigure(wx,wy);
            if(fi!==-1 && figures[fi].locked) return;
        }

        if(mode==='create'){
            const s=parseInt(document.getElementById('sidesInput').value);
            if(s>=3&&s<=10){saveState();figures.push(createPolygon(wx,wy,s));redrawAll();}
        }
        else if(mode==='line'){
    let start = {x: wx, y: wy};
    if (snapEnabled) start = applySnap(wx, wy, -1, -1);
    lineStartPoint = start;
    dragData = {type: 'line', currentPoint: {x: start.x, y: start.y}};
    redrawAll();
}
        else if(mode==='grain'){
            const fi=findClickedFigure(wx,wy);
            if(fi!==-1 && figures[fi].closed){
                saveState();
                figures[fi].grain = (figures[fi].grain === grainDir) ? null : grainDir;
                redrawAll();
            }
        }
        else if(mode==='move'){
            const fi=findClickedFigure(wx,wy);
            if(fi!==-1){saveState();dragData={type:'figure',figureIndex:fi,startX:wx,startY:wy};}
        }
        else if(mode==='vertex'){
            const nv=findNearestVertex(wx,wy);
            if(nv){
                selectedVertex=nv;
                document.getElementById('vertexDX').value='1';
                document.getElementById('vertexDY').value='1';
                showPanel('vertexInputs');
                if(!document.getElementById('vertexFijar').checked){
    saveState();
    dragData={type:'vertex',figureIndex:nv.figureIndex,vertexIndex:nv.vertexIndex,lastX:figures[nv.figureIndex].vertices[nv.vertexIndex].x,lastY:figures[nv.figureIndex].vertices[nv.vertexIndex].y};
} else {
    redrawAll();
}
            }
        }
        else if(mode==='addVertex'){
            const ne=findNearestEdge(wx,wy);
            if(ne){saveState();addVertexOnEdge(ne.figureIndex,ne.edgeIndex,wx,wy);redrawAll();}
        }

        else if(mode==='deleteVertex'){
            const nv = findNearestVertex(wx,wy);
            if(nv && !figures[nv.figureIndex].locked){
                saveState();
                deleteVertex(nv.figureIndex, nv.vertexIndex);                
                redrawAll();
            }
        }
//---------
        else if(mode==='curve'){
            // Midpoint drag: al presionar sobre una arista se activa el arrastre de curva
            const ne=findNearestEdge(wx,wy);
            if(ne){
                saveState();
                const edge=figures[ne.figureIndex].edges[ne.edgeIndex];
                // Inicializar controlX/Y en el punto donde se hizo clic (será el midpoint inicial)
                if(!edge.curved){
                    edge.curved=true; edge.cubic=false;
                    edge.controlX=wx; edge.controlY=wy;
                    edge.control2X=null; edge.control2Y=null;
                }
                curveActiveDrag={figureIndex:ne.figureIndex,edgeIndex:ne.edgeIndex};
                redrawAll();
            }
        }
        else if(mode==='straighten'){
            const ne=findNearestEdge(wx,wy);
            if(ne){const edge=figures[ne.figureIndex].edges[ne.edgeIndex];if(edge.curved){saveState();edge.curved=false;edge.cubic=false;edge.controlX=null;edge.controlY=null;edge.control2X=null;edge.control2Y=null;redrawAll();}}
        }
        else if(mode==='joinCurves'){
            const ne=findNearestEdge(wx,wy);
            if(ne){
                const edge=figures[ne.figureIndex].edges[ne.edgeIndex];if(!edge.curved)return;
                const idx=joinSelection.findIndex(s=>s.figureIndex===ne.figureIndex&&s.edgeIndex===ne.edgeIndex);
                if(idx>=0)joinSelection.splice(idx,1);else joinSelection.push({figureIndex:ne.figureIndex,edgeIndex:ne.edgeIndex});
                redrawAll();
            }
        }
        else if(mode==='resize'){
            const ne=findNearestEdge(wx,wy);
            if(ne){
                const idx=resizeEdges.findIndex(o=>o.figureIndex===ne.figureIndex&&o.edgeIndex===ne.edgeIndex);
                if(idx>=0){
                    resizeEdges.splice(idx,1);
                } else {
                    resizeEdges.push({figureIndex:ne.figureIndex, edgeIndex:ne.edgeIndex, clickX:wx, clickY:wy});
                }
                updateResizePanel();
                redrawAll();
            }
        }
        else if(mode==='edgeMove'){
            const ne=findNearestEdge(wx,wy);
            if(ne && !figures[ne.figureIndex].locked){
                saveState();
                dragData={type:'edgeMove', figureIndex:ne.figureIndex, edgeIndex:ne.edgeIndex, startX:wx, startY:wy};
                redrawAll();
            }
        }
        else if(mode==='offset'){
    const ne=findNearestEdge(wx,wy);
    if(ne){
        const fig=figures[ne.figureIndex];
        if(!fig.closed) return;
        if(offsetEdges.length>0 && offsetEdges[0].figureIndex !== ne.figureIndex){
            showModal({title:'Aviso',body:'Solo puedes seleccionar lados de la misma figura.',buttons:[{label:'OK'}]});
            return;
        }
        const idx=offsetEdges.findIndex(o=>o.figureIndex===ne.figureIndex&&o.edgeIndex===ne.edgeIndex);
        if(idx>=0) offsetEdges.splice(idx,1);
        else offsetEdges.push({figureIndex:ne.figureIndex, edgeIndex:ne.edgeIndex});
        if(offsetEdges.length>0) showPanel('offsetInputs');
        else hidePanel('offsetInputs');
        redrawAll();
    }
}
        else if(mode==='cut'){
            // Seleccionar/deseleccionar solo líneas (no cerradas) como líneas de corte
            for(let fi=figures.length-1;fi>=0;fi--){
                const fig=figures[fi];
                if(fig.closed) continue; // solo líneas abiertas
                let near=false;
                for(const e of fig.edges){
                    if(edgeDist(wx,wy,fig,e)<15/viewScale){near=true;break;}
                }
                if(near){
                    const idx=cutLineIndices.indexOf(fi);
                    if(idx>=0) cutLineIndices.splice(idx,1);
                    else cutLineIndices.push(fi);
                    redrawAll();
                    return;
                }
            }
        }
        else if(mode==='closeShape'){
            // Seleccionar/deseleccionar líneas abiertas para cerrar figura
            for(let fi=figures.length-1;fi>=0;fi--){
                const fig=figures[fi];
                if(fig.closed) continue;
                let near=false;
                for(const e of fig.edges){
                    if(edgeDist(wx,wy,fig,e)<15/viewScale){near=true;break;}
                }
                if(near){
                    const idx=closeLineIndices.indexOf(fi);
                    if(idx>=0) closeLineIndices.splice(idx,1);
                    else closeLineIndices.push(fi);
                    redrawAll();
                    return;
                }
            }
        }
        else if(mode==='rotate'){
            const fi=findClickedFigure(wx,wy);
            if(fi!==-1){saveState();rotateFigure(fi,parseFloat(document.getElementById('rotateInput').value)||90);redrawAll();}
        }
        else if(mode==='duplicate'){
            const fi=findClickedFigure(wx,wy);if(fi!==-1){saveState();duplicateFigure(fi);redrawAll();}
        }
        else if(mode==='reflect'){
            const fi=findClickedFigure(wx,wy);if(fi!==-1){saveState();reflectFigure(fi);redrawAll();}
        }
        else if(mode==='delete'){
            const fi=findClickedFigure(wx,wy);if(fi!==-1){saveState();figures.splice(fi,1);redrawAll();}
        }
        else if(mode==='lock'){
            const fi=findClickedFigure(wx,wy);
            if(fi!==-1){figures[fi].locked=!figures[fi].locked;redrawAll();}
        }
        else if(mode==='mirror'){
            const ne=findNearestEdge(wx,wy);if(ne){saveState();unfoldFigureInPlace(figures[ne.figureIndex],ne.edgeIndex);redrawAll();}
        }
    }

    function handlePointerMove(pos){
        const wx=pos.x,wy=pos.y;

        if(mode==='curve' && curveActiveDrag){
            const fig=figures[curveActiveDrag.figureIndex];
            const edge=fig.edges[curveActiveDrag.edgeIndex];
            const a=fig.vertices[edge.start], b=fig.vertices[edge.end];
            const cp = controlFromMidpoint(a, {x:wx,y:wy}, b);
            edge.curved=true; edge.cubic=false;
            edge.controlX=cp.x; edge.controlY=cp.y;
            edge.control2X=null; edge.control2Y=null;
            redrawAll();
            return;
        }

        if(mode==='line' && lineStartPoint) {
            if (dragData && dragData.type==='line') dragData.currentPoint = {x: wx, y: wy};
            redrawAll();
            const dpr=window.devicePixelRatio||1;
            ctx.save();
            ctx.setTransform(dpr*viewScale,0,0,dpr*viewScale,dpr*viewOffX,dpr*viewOffY);
            ctx.beginPath(); ctx.moveTo(lineStartPoint.x, lineStartPoint.y); ctx.lineTo(wx, wy);
            ctx.strokeStyle='#000'; ctx.setLineDash([]); ctx.lineWidth=2/viewScale; ctx.stroke();
            ctx.restore();
            return;
        }
        if(!dragData) return;

        if(dragData.type==='edgeMove'){
            const dx=wx-dragData.startX, dy=wy-dragData.startY;
            const fig=figures[dragData.figureIndex];
            const edge=fig.edges[dragData.edgeIndex];
            const v1=fig.vertices[edge.start], v2=fig.vertices[edge.end];
            const oldV1={x:v1.x,y:v1.y}, oldV2={x:v2.x,y:v2.y};
            v1.x+=dx; v1.y+=dy;
            v2.x+=dx; v2.y+=dy;
            if(edge.controlX!=null){edge.controlX+=dx; edge.controlY+=dy;}
            if(edge.control2X!=null){edge.control2X+=dx; edge.control2Y+=dy;}
            edgeMoveAdjustNeighbor(fig, edge.start, oldV1, edge);
            edgeMoveAdjustNeighbor(fig, edge.end, oldV2, edge);
            dragData.startX=wx; dragData.startY=wy;
            redrawAll();
        }

        else if(dragData.type==='figure'){
            const dx=wx-dragData.startX,dy=wy-dragData.startY;
            const f=figures[dragData.figureIndex];
            f.vertices.forEach(v=>{v.x+=dx;v.y+=dy;});
            f.edges.forEach(e=>{if(e.controlX!=null){e.controlX+=dx;e.controlY+=dy;}if(e.control2X!=null){e.control2X+=dx;e.control2Y+=dy;}});
            if (snapEnabled) {
                const thr = getSnapThreshold();

                // snap vértice a vértice
                for (let vi=0; vi<f.vertices.length; vi++) {
                    const v = f.vertices[vi];
                    for (let ofi=0; ofi<figures.length; ofi++) {
                        if (ofi === dragData.figureIndex) continue;
                        for (let ovi=0; ovi<figures[ofi].vertices.length; ovi++) {
                            const ov = figures[ofi].vertices[ovi];
                            if (Math.hypot(v.x-ov.x, v.y-ov.y) < thr) {
                                const offsetX = ov.x - v.x, offsetY = ov.y - v.y;
                                f.vertices.forEach(vert => {vert.x += offsetX; vert.y += offsetY;});
                                f.edges.forEach(e => {if(e.controlX!=null){e.controlX+=offsetX;e.controlY+=offsetY;}if(e.control2X!=null){e.control2X+=offsetX;e.control2Y+=offsetY;}});
                                dragData.startX = wx; dragData.startY = wy;
                                redrawAll(); return;
                            }
                        }
                    }
                }

                if (snapEdgeEnabled && !f.closed) {
                    // PASO 1: snap vértice de figura que se mueve contra arista de otra (deslizarse como riel)
                    let bestD1 = thr, bestOffX1 = 0, bestOffY1 = 0, snapped1 = false;
                    for (let vi=0; vi<f.vertices.length; vi++) {
                        const v = f.vertices[vi];
                        for (let ofi=0; ofi<figures.length; ofi++) {
                            if (ofi === dragData.figureIndex) continue;
                            const fig2 = figures[ofi];
                            for (let ei=0; ei<fig2.edges.length; ei++) {
                                const e = fig2.edges[ei];
                                const a = fig2.vertices[e.start], b = fig2.vertices[e.end];
                                const cl = closestOnLine(v.x, v.y, a.x, a.y, b.x, b.y);
                                const d = Math.hypot(v.x - cl.x, v.y - cl.y);
                                if (d < bestD1) {
                                    const dx2 = b.x-a.x, dy2 = b.y-a.y;
                                    const len = Math.hypot(dx2, dy2);
                                    if (len < 0.01) continue;
                                    const nx = -dy2/len, ny = dx2/len;
                                    const err = (v.x-cl.x)*nx + (v.y-cl.y)*ny;
                                    bestD1 = d; bestOffX1 = -err*nx; bestOffY1 = -err*ny; snapped1 = true;
                                }
                            }
                        }
                    }
                    if (snapped1) {
                        f.vertices.forEach(vert => {vert.x+=bestOffX1; vert.y+=bestOffY1;});
                        f.edges.forEach(e2 => {if(e2.controlX!=null){e2.controlX+=bestOffX1;e2.controlY+=bestOffY1;}if(e2.control2X!=null){e2.control2X+=bestOffX1;e2.control2Y+=bestOffY1;}});
                    }

                    // PASO 2: snap arista de figura que se mueve contra vértice de otra figura
                    let bestD2 = thr, bestOffX2 = 0, bestOffY2 = 0, snapped2 = false;
                    for (let ei=0; ei<f.edges.length; ei++) {
                        const e = f.edges[ei];
                        const a = f.vertices[e.start], b = f.vertices[e.end];
                        for (let ofi=0; ofi<figures.length; ofi++) {
                            if (ofi === dragData.figureIndex) continue;
                            const fig2 = figures[ofi];
                            for (let ovi=0; ovi<fig2.vertices.length; ovi++) {
                                const ov = fig2.vertices[ovi];
                                const cl = closestOnLine(ov.x, ov.y, a.x, a.y, b.x, b.y);
                                const d = Math.hypot(ov.x - cl.x, ov.y - cl.y);
                                if (d < bestD2) {
                                    const dx2 = b.x-a.x, dy2 = b.y-a.y;
                                    const len = Math.hypot(dx2, dy2);
                                    if (len < 0.01) continue;
                                    const nx = -dy2/len, ny = dx2/len;
                                    const err = (cl.x-ov.x)*nx + (cl.y-ov.y)*ny;
                                    bestD2 = d; bestOffX2 = -err*nx; bestOffY2 = -err*ny; snapped2 = true;
                                }
                            }
                        }
                    }
                    if (snapped2) {
                        f.vertices.forEach(vert => {vert.x+=bestOffX2; vert.y+=bestOffY2;});
                        f.edges.forEach(e2 => {if(e2.controlX!=null){e2.controlX+=bestOffX2;e2.controlY+=bestOffY2;}if(e2.control2X!=null){e2.control2X+=bestOffX2;e2.control2Y+=bestOffY2;}});
                    }

                    if (snapped1 || snapped2) {
                        dragData.startX=wx; dragData.startY=wy;
                        redrawAll(); return;
                    }
                }
            }
            dragData.startX=wx;dragData.startY=wy;redrawAll();
        }

        else if(dragData.type==='vertex'){
            let nx=wx,ny=wy;
            if(snapEnabled){const s=applySnap(wx,wy,dragData.figureIndex,dragData.vertexIndex);nx=s.x;ny=s.y;}
            const fig=figures[dragData.figureIndex];
            const vi=dragData.vertexIndex;
            fig.vertices[vi].x=nx; fig.vertices[vi].y=ny;
            fig.edges.forEach(e=>{
                if(e.controlX!=null){
                    const a=fig.vertices[e.start], b=fig.vertices[e.end];
                    const oldA=e.start===vi?{x:dragData.lastX??nx,y:dragData.lastY??ny}:a;
                    const oldB=e.end===vi  ?{x:dragData.lastX??nx,y:dragData.lastY??ny}:b;
                    const denom=Math.hypot(oldB.x-oldA.x,oldB.y-oldA.y);
                    if(denom>0.01){
                        const tx=((e.controlX-oldA.x)*(oldB.x-oldA.x)+(e.controlY-oldA.y)*(oldB.y-oldA.y))/(denom*denom);
                        const ty=((e.controlY-oldA.y)*(oldB.x-oldA.x)-(e.controlX-oldA.x)*(oldB.y-oldA.y))/(denom*denom);
                        e.controlX=a.x+tx*(b.x-a.x)-ty*(b.y-a.y);
                        e.controlY=a.y+tx*(b.y-a.y)+ty*(b.x-a.x);
                    }
                }
            });
            dragData.lastX=nx; dragData.lastY=ny;
            redrawAll(); if(snapEnabled) drawSnapGuides(nx,ny,dragData.figureIndex,dragData.vertexIndex);
        }
}

    function updateResizePanel(){
        const input=document.getElementById('resizeValue');
        if(resizeEdges.length===1){
            selectedEdge=resizeEdges[0];
            const fig=figures[selectedEdge.figureIndex], edge=fig.edges[selectedEdge.edgeIndex];
            input.value=pxToCm(edgeLength(fig, edge));
            input.disabled=false;
            showPanel('resizeInputs');
        } else if(resizeEdges.length>1){
            selectedEdge=null;
            input.value='';
            input.disabled=true;
            document.getElementById('resizeIndicator').textContent='';
            showPanel('resizeInputs');
        } else {
            selectedEdge=null;
            input.disabled=false;
            hidePanel('resizeInputs');
        }
    }

    function applyResize(){
        if(resizeEdges.length!==1){showModal({title:'Error',body:'Selecciona solo una arista para aplicar un valor.',buttons:[{label:'OK'}]});return;}
        const se=resizeEdges[0];
        const newPx=cmToPx(document.getElementById('resizeValue').value);
        if(isNaN(newPx)||newPx<=0){showModal({title:'Valor invAlido',body:'Ej: 25.5 o 25,5',buttons:[{label:'OK'}]});return;}
        saveState();resizeEdge(se.figureIndex,se.edgeIndex,newPx,se.clickX,se.clickY);
        resizeEdges=[];
        hidePanel('resizeInputs');redrawAll();
    }

    function applyVertexDelta(){
        if(!selectedVertex){showModal({title:'Error',body:'Primero selecciona un vértice.',buttons:[{label:'OK'}]});return;}
        const dx=parseFloat(String(document.getElementById('vertexDX').value).replace(',','.'));
        const dy=parseFloat(String(document.getElementById('vertexDY').value).replace(',','.'));
        if(isNaN(dx)&&isNaN(dy)) return;
        saveState();
        const v=figures[selectedVertex.figureIndex].vertices[selectedVertex.vertexIndex];
        if(!isNaN(dx)) v.x+=dx*PX_PER_CM;
        if(!isNaN(dy)) v.y+=dy*PX_PER_CM;

        document.getElementById('vertexDX').value='0';
        document.getElementById('vertexDY').value='0';
        redrawAll();
    }

    // ===================== EXPORT / IMPORT =====================
    function exportJSON(){
    const data={
        unit:'cm',pxPerCm:PX_PER_CM,grainDirection:grainDir,
        figures:figures.map(fig=>({
            grain:fig.grain||null, closed:fig.closed,
            vertices:fig.vertices.map(v=>({x:v.x,y:v.y,xCm:pxToCm(v.x),yCm:pxToCm(v.y)})),
            edges:fig.edges
        }))
    };
    const json=JSON.stringify(data,null,2);

    showModal({title:'Exportar patron.json',textarea:json,
        buttons:[
            {label:'📋 Copiar',value:'copy'},
            {label:'💾 Descargar (Android)',value:'dl'},
            {label:'✕ Cerrar',value:'close'}
        ]
    }).then(a=>{
        if(a==='copy'){
            (navigator.clipboard?navigator.clipboard.writeText(json):Promise.reject())
                .catch(()=>{
                    const ta=document.querySelector('.modal-box textarea');
                    if(ta){ta.select();document.execCommand('copy');}
                });
        } else if(a==='dl'){
            // Método robusto para Android
            const blob = new Blob([json], {type: 'application/json'});
            const url = URL.createObjectURL(blob);

            // Creamos un enlace y simulamos click
            const a = document.createElement('a');
            a.href = url;
            a.download = 'patron.json';
            a.style.display = 'none';
            document.body.appendChild(a);
            a.click();

            // En Android a veces no se abre el diálogo; abrimos en nueva pestaña para forzar descarga
            setTimeout(() => {
                document.body.removeChild(a);
                // Fallback: abrir en nueva pestaña (el navegador lo descargará automáticamente al ser blob)
                const newWindow = window.open(url, '_blank');
                if (!newWindow) {
                    // Si el popup está bloqueado, mostramos instrucciones claras
                    showModal({
                        title:'Archivo generado',
                        body:'Si no se descargó automáticamente, revisa la carpeta "Descargas" o usa "Copiar" y pégalo en un editor de texto para guardarlo manualmente.',
                        buttons:[{label:'Entendido'}]
                    });
                }
                // Limpiamos la URL después de un rato
                setTimeout(() => URL.revokeObjectURL(url), 5000);
            }, 200);
        }
    });
}

    function exportSVG(){
        let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
        figures.forEach(fig=>{fig.vertices.forEach(v=>{minX=Math.min(minX,v.x);minY=Math.min(minY,v.y);maxX=Math.max(maxX,v.x);maxY=Math.max(maxY,v.y);});});
        const pad=20;
        const W=maxX-minX+pad*2, H=maxY-minY+pad*2;
        const ox=minX-pad, oy=minY-pad;
    
        function pathD(fig){
            let d='';
            fig.edges.forEach(e=>{
                const a=fig.vertices[e.start], b=fig.vertices[e.end];
                if(!d) d+=`M ${a.x-ox} ${a.y-oy} `;
                if(e.cubic&&e.control2X!=null) d+=`C ${e.controlX-ox} ${e.controlY-oy} ${e.control2X-ox} ${e.control2Y-oy} ${b.x-ox} ${b.y-oy} `;
                else if(e.curved&&e.controlX!=null) d+=`Q ${e.controlX-ox} ${e.controlY-oy} ${b.x-ox} ${b.y-oy} `;
                else d+=`L ${b.x-ox} ${b.y-oy} `;
            });
            if(fig.closed) d+='Z';
            return d.trim();
        }
    
        let svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">\n`;
        figures.forEach((fig,i)=>{
            svg+=`  <path id="fig${i}" d="${pathD(fig)}" fill="none" stroke="black" stroke-width="2"/>\n`;
        });
        svg+=`</svg>`;
    
        showModal({title:'Exportar SVG',textarea:svg,
            buttons:[{label:'📋 Copiar',value:'copy'},{label:'💾 Descargar',value:'dl'},{label:'✕ Cerrar',value:'close'}]
        }).then(a=>{
            if(a==='copy'){
                (navigator.clipboard?navigator.clipboard.writeText(svg):Promise.reject())
                    .catch(()=>{const ta=document.querySelector('.modal-box textarea');if(ta){ta.select();document.execCommand('copy');}});
            } else if(a==='dl'){
                const blob=new Blob([svg],{type:'image/svg+xml'});
                const url=URL.createObjectURL(blob),el=document.createElement('a');
                el.href=url;el.download='patron.svg';document.body.appendChild(el);el.click();
                setTimeout(()=>{document.body.removeChild(el);URL.revokeObjectURL(url);},300);
            }
        });
    }

    function importJSON(){
    showModal({
        title:'Importar JSON',
        body:'¿Subir archivo o pegar texto?',
        buttons:[{label:'📂 Archivo',value:'file'},{label:'📋 Pegar',value:'paste'},{label:'✕ Cancelar',value:'cancel'}]
    }).then(action=>{
        if(action==='file'){
            const inp=document.createElement('input');inp.type='file';inp.accept='.json';
            inp.onchange=e=>{
                const file=e.target.files[0];if(!file)return;
                const reader=new FileReader();
                reader.onload=ev=>{ parseImportJSON(ev.target.result); };
                reader.readAsText(file);
            };
            inp.click();
        } else if(action==='paste'){
    let capturedText='';
    showModal({
        title:'Pegar JSON',
        textarea:'',
        editable:true,
        buttons:[{label:'✓ Importar',value:'ok'},{label:'✕ Cancelar',value:'cancel'}]
    }).then(r=>{
        if(r==='ok') parseImportJSON(capturedText);
    });
    setTimeout(()=>{
        const ta=document.querySelector('.modal-box textarea');
        if(ta) ta.addEventListener('input',e=>capturedText=e.target.value);
    },100);
}
    });
}

function parseImportJSON(text){
    try{
        const data=JSON.parse(text);
        if(data.figures&&Array.isArray(data.figures)){
            if(data.grainDirection){grainDir=data.grainDirection;document.getElementById('grainDirBtn').textContent=grainDir==='horizontal'?'→':'↕';}
            saveState();figures=[...figures,...data.figures];
            centerViewOnFigures();redrawAll();
        } else if(Array.isArray(data)){
            if(!data.every(f=>f.vertices&&f.edges)){showModal({title:'Error',body:'Formato incorrecto.',buttons:[{label:'OK'}]});return;}
            saveState();figures=[...figures,...data];
            centerViewOnFigures();redrawAll();
        } else showModal({title:'Error',body:'Formato incorrecto.',buttons:[{label:'OK'}]});
    }catch(err){showModal({title:'Error',body:err.message,buttons:[{label:'OK'}]});}
}

function centerViewOnFigures(){
    if(figures.length===0) return;
    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    figures.forEach(fig=>fig.vertices.forEach(v=>{
        minX=Math.min(minX,v.x);minY=Math.min(minY,v.y);
        maxX=Math.max(maxX,v.x);maxY=Math.max(maxY,v.y);
    }));
    const W=window.innerWidth, H=window.innerHeight-getToolbarHeight();
    const figW=maxX-minX, figH=maxY-minY;
    viewScale=Math.min(W/figW, H/figH)*0.85;
    viewOffX=W/2 - (minX+figW/2)*viewScale;
    viewOffY=getToolbarHeight() + H/2 - (minY+figH/2)*viewScale;
    updateZoomIndicator();
}

    document.addEventListener('keydown',e=>{
        if(e.ctrlKey&&e.key==='z'&&!e.shiftKey){e.preventDefault();undoAction();}
        if(e.key==='0'&&e.ctrlKey){e.preventDefault();resetView();}
        if(e.key==='Escape'){setMode('none');}
    });

    updateZoomIndicator();
</script>
